        .description em {

    </style>
</head>
<body>
<div class="container">

        <h1>
            📘 Класс XVII. Врожденные аномалии (пороки развития), деформации и хромосомные нарушения (Q00–Q99)
            <span>МКБ-10 + коды ССиНМП</span>

<script>

        { name: "Врожденная аномалия конечности неуточненная", internalCode: "1692", mkb: "Q74.9", desc: "" },
        { name: "Врожденная аномалия мочевыделительной системы неуточненная", internalCode: "1688", mkb: "Q64.9", desc: "" },
        { name: "Врожденная аномалия мужских половых органов неуточненная", internalCode: "1686", mkb: "Q55.9", desc: "" },
        { name: "Врожденная аномалия пищевода неуточненная", internalCode: "4106", mkb: "Q39.9", desc: "" },

        { name: "Врожденная аномалия сердечной перегородки неуточненная", internalCode: "2450", mkb: "Q21.9", desc: "" },

        { name: "Врожденная аномалия (порок развития) челюстно-лицевой области", internalCode: "4115", mkb: "Q18.8", desc: "" },

        { name: "Врожденная диафрагмальная грыжа", internalCode: "4109", mkb: "Q79.0", desc: "" },
        { name: "Врожденная киста легкого", internalCode: "4118", mkb: "Q33.0", desc: "" },
        { name: "Врожденная киста пищевода", internalCode: "4119", mkb: "Q39.8", desc: "" },
        { name: "Врожденные деформации стопы неуточненные", internalCode: "1690", mkb: "Q66.9", desc: "" },
        { name: "Врожденный вывих бедра двусторонний", internalCode: "2453", mkb: "Q65.1", desc: "" },
        { name: "Врожденный вывих бедра односторонний", internalCode: "1689", mkb: "Q65.0", desc: "" },
        { name: "Врожденный порок развития легкого неуточненный (гипоплазия и дисплазия легкого)", internalCode: "1698", mkb: "Q33.6", desc: "гипоплазия легкого, недоразвитие легкого" },
        { name: "Врожденный порок развития спинного мозга неуточненный", internalCode: "1677", mkb: "Q06.9", desc: "" },
        { name: "Врожденный порок сердца неуточненный", internalCode: "1680", mkb: "Q24.9", desc: "" },
        { name: "Врожденный свищ прямой кишки и ануса", internalCode: "4107", mkb: "Q43.6", desc: "" },
        { name: "Врожденный стеноз аортального клапана", internalCode: "4100", mkb: "Q23.0", desc: "" },
        { name: "Гастрошиз", internalCode: "4111", mkb: "Q79.3", desc: "" },
        { name: "Гипоплазия легкого", internalCode: "1698", mkb: "Q33.6", desc: "" },
        { name: "Другие врожденные аномалии (пороки развития) легкого", internalCode: "1699", mkb: "Q33.8", desc: "" },
        { name: "Другие врожденные деформации грудной клетки", internalCode: "1691", mkb: "Q67.8", desc: "" },
        { name: "Другие синдромы врожденных аномалий, обусловленные воздействием известных экзогенных факторов", internalCode: "1693", mkb: "Q86.8", desc: "" },
        { name: "Другие уточненные врожденные аномалии (пороки развития) органов дыхания", internalCode: "2999", mkb: "Q34.8", desc: "" },
        { name: "Другие уточненные врожденные аномалии мочевыделительной системы", internalCode: "1687", mkb: "Q64.8", desc: "" },
        { name: "Другие уточненные врожденные аномалии органов пищеварения", internalCode: "1683", mkb: "Q45.8", desc: "в том числе: отсутствие пищеварительного тракта неуточненное, удвоение или неправильное положение органов пищеварения неуточненное" },
        { name: "Другие уточненные врожденные аномалии сердца", internalCode: "4102", mkb: "Q24.8", desc: "" },
        { name: "Другие уточненные хромосомные аномалии", internalCode: "1696", mkb: "Q99.8", desc: "" },
        { name: "Коарктация аорты", internalCode: "4103", mkb: "Q25.1", desc: "" },
        { name: "Множественные врожденные аномалии (пороки развития), не классифицированные в других рубриках", internalCode: "4112", mkb: "Q89.7", desc: "" },
        { name: "Недоразвитие легкого", internalCode: "1698", mkb: "Q33.6", desc: "" },
        { name: "Неопущение яичка неуточненное (крипторхизм БДУ)", internalCode: "2452", mkb: "Q53.9", desc: "крипторхизм БДУ" },
        { name: "Порок развития верхней части пищеварительного тракта неуточненный (включая пилоростеноз)", internalCode: "2451", mkb: "Q40.9", desc: "пилоростеноз (Q40.0)" },
        { name: "Порок развития органов пищеварения неуточненный", internalCode: "1684", mkb: "Q45.9", desc: "" },
        { name: "Расщелина губы [заячья губа] односторонняя", internalCode: "1682", mkb: "Q36.9", desc: "заячья губа БДУ" },
        { name: "Расщелина неба [волчья пасть] неуточненная односторонняя", internalCode: "1681", mkb: "Q35.9", desc: "" },
        { name: "Синдром Дауна неуточненный", internalCode: "1695", mkb: "Q90.9", desc: "" },
        { name: "Синдром Марфана", internalCode: "2454", mkb: "Q87.4", desc: "" },
        { name: "Синдром Патау неуточненный", internalCode: "4114", mkb: "Q91.7", desc: "" },
        { name: "Синдром Шерешевского-Тернера неуточненный", internalCode: "4120", mkb: "Q96.9", desc: "" },
        { name: "Синдром Эдвардса неуточненный", internalCode: "4113", mkb: "Q91.3", desc: "" },
        { name: "Spina bifida неуточненная (неполное закрытие позвоночного канала)", internalCode: "4099", mkb: "Q05.9", desc: "неполное закрытие позвоночного канала" },
        { name: "Тетрада Фалло", internalCode: "1679", mkb: "Q21.3", desc: "" },
        { name: "Трахеопищеводный свищ без атрезии", internalCode: "4121", mkb: "Q39.2", desc: "" },
        { name: "Удвоение пищевода", internalCode: "4122", mkb: "Q39.4", desc: "" },
        { name: "Хромосомная аномалия неуточненная", internalCode: "1697", mkb: "Q99.9", desc: "" },
        { name: "Экзомфалоз (омфалоцеле)", internalCode: "4110", mkb: "Q79.2", desc: "омфалоцеле. Исключено: пупочная грыжа (K42...)" },
        { name: "Экстрофия мочевого пузыря", internalCode: "4123", mkb: "Q64.1", desc: "" }
    ];

    // Удаление дубликатов по internalCode + mkb
    const uniqueData = [];
    const keySet = new Set();
    for (const item of congenitalData) {
        const key = `${item.internalCode}|${item.mkb}`;
        if (!keySet.has(key)) {
            keySet.add(key);
            uniqueData.push(item);
        }
    }

    // Сортировка по алфавиту
    uniqueData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCards(filterText = '') {
        const grid = document.getElementById('congenitalGrid');
        if (!grid) return;
        
        const lowerFilter = filterText.toLowerCase().trim();
        let filtered = uniqueData;
        
        if (lowerFilter !== '') {
            filtered = uniqueData.filter(item => {
                return item.name.toLowerCase().includes(lowerFilter) ||
                       item.mkb.toLowerCase().includes(lowerFilter) ||
                       item.internalCode.includes(lowerFilter) ||
                       (item.desc && item.desc.toLowerCase().includes(lowerFilter));
            });
        }
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">🚫 Ничего не найдено. Попробуйте другой поисковый запрос.</div>`;
            return;
        }
        
        grid.innerHTML = '';
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'disease-name';
            nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);
            
            const codeBlockDiv = document.createElement('div');
            codeBlockDiv.className = 'code-block';
            
            const codesRow = document.createElement('div');
            codesRow.className = 'codes-row';
            
            const mkbSpan = document.createElement('div');
            mkbSpan.className = 'mkb-line';
            mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codesRow.appendChild(mkbSpan);
            
            const innerSpan = document.createElement('div');
            innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codesRow.appendChild(innerSpan);
            
            codeBlockDiv.appendChild(codesRow);
            
            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div');
                descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }
            
            card.appendChild(titleDiv);
            card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderCards(e.target.value);
        });
    }
    
    renderCards();
</script>
</body>
</html>
