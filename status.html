<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>STATUS LOCALIS</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
    font-size: 28px;
  }

  .status-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .status-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 0;
    border-radius: 12px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .status-btn:active {
    transform: scale(0.98);
  }

  .status-btn.disabled {
    background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
    cursor: not-allowed;
    opacity: 0.65;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .status-menu {
      max-width: 90%;
    }
    .status-btn {
      font-size: 16px;
      padding: 14px 0;
    }
    h1 {
      font-size: 24px;
    }
  }
</style>
</head>
<body>

<h1>📋 Status localis</h1>

<div class="status-menu">
  <button class="status-btn" onclick="window.location.href='other_local_status.html'">Прочий локальный статус</button>
  <button class="status-btn" onclick="window.location.href='dislocations.html'">Вывихи</button>
  <button class="status-btn" onclick="window.location.href='fractures_upper_limb.html'">Переломы в/конечности</button>
  <button class="status-btn" onclick="window.location.href='fractures_lower_limb.html'">Переломы н/конечности</button>
  <button class="status-btn" onclick="window.location.href='fractures_ribs.html'">Переломы гр/клетки</button>
  <button class="status-btn" onclick="window.location.href='spine_fractures.html'">Переломы позвоночника</button>
  <button class="status-btn" onclick="window.location.href='facial_fractures.html'">Переломы лицевого черепа</button>
  <button class="status-btn" onclick="window.location.href='ligament_muscle_injuries.html'">Травмы связок и мышц</button>
  <button class="status-btn" onclick="window.location.href='contusions_and_abrasions.html'">Ушибы и ссадины</button>
  <button class="status-btn" onclick="window.location.href='wounds_including_infected.html'">Раны, в т.ч инфицированные</button>
  <button class="status-btn" onclick="window.location.href='head_injury.html'">Черепно-мозговые травмы</button>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ SW зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка:', err));
  }
</script>

</body>
</html>
