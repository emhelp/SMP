<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATUS LOCALIS</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .status-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .status-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 16px 0;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .status-btn:hover {
    background: #3949ab;
  }

  .status-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .status-menu {
      max-width: 90%;
    }
    .status-btn {
      font-size: 16px;
      padding: 14px 0;
    }
  }
</style>
</head>
<body>

<h1>STATUS LOCALIS</h1>

<div class="status-menu">
  <button class="status-btn" onclick="window.location.href='other_local_status.html'">ПРОЧИЙ ЛОКАЛЬНЫЙ СТАТУС</button>
  <button class="status-btn" onclick="window.location.href='dislocations.html'">ВЫВИХИ</button>
  <button class="status-btn" onclick="window.location.href='fractures_upper_limb.html'">ПЕРЕЛОМЫ в/конечность</button>
  <button class="status-btn" onclick="window.location.href='fractures_lower_limb.html'">ПЕРЕЛОМЫ н/конечность</button>
  <button class="status-btn" onclick="window.location.href='fractures_ribs.html'">ПЕРЕЛОМЫ гр/клетка</button>
  <button class="status-btn" onclick="window.location.href='spine_fractures.html'">ПЕРЕЛОМЫ позвоночник</button>
  <button class="status-btn" onclick="window.location.href='facial_fractures.html'">ПЕРЕЛОМЫ лицевой череп</button>
  <button class="status-btn" onclick="window.location.href='ligament_muscle_injuries.html'">ТРАВМЫ связки/мышцы</button>
  <button class="status-btn" onclick="window.location.href='contusions_and_abrasions.html'">УШИБЫ И ССАДИНЫ</button>
  <button class="status-btn" onclick="window.location.href='wounds_including_infected.html'">РАНЫ в т.ч инфицированные</button>
  <button class="status-btn" onclick="window.location.href='head_injury.html'">ЧМТ</button>
</div>

</body>
</html>
