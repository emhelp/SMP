<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATUS LOCALIS</title>
<!-- Отключаем кэширование -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .status-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .status-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 16px 0;
    border-radius: 8px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .status-btn:hover {
    background: #3949ab;
  }

  .status-btn:active {
    transform: scale(0.98);
  }

  /* Стили для неактивных кнопок */
  .status-btn.disabled {
    background: #6c757d;
    cursor: not-allowed;
    opacity: 0.65;
    pointer-events: none;
  }

  .status-btn.disabled:hover {
    background: #6c757d;
    transform: none;
  }

  @media (max-width: 600px) {
    .status-menu {
      max-width: 90%;
    }
    .status-btn {
      font-size: 16px;
      padding: 14px 0;
    }
  }
</style>
</head>
<body>

<h1>Status localis</h1>

<div class="status-menu">
  <button class="status-btn" onclick="window.location.href='other_local_status.html'">Прочий локальный статус</button>
  <button class="status-btn" onclick="window.location.href='dislocations.html'">Вывихи</button>
  <button class="status-btn disabled">Переломы в/конечности</button>
  <button class="status-btn disabled">Переломы н/конечности</button>
  <button class="status-btn disabled">Переломы гр/клетки</button>
  <button class="status-btn disabled">Переломы позвоночника</button>
  <button class="status-btn disabled">Переломы лицевого черепа</button>
  <button class="status-btn disabled">Травмы связок и мышц</button>
  <button class="status-btn disabled">Ушибы и ссадины</button>
  <button class="status-btn disabled">Раны, в т.ч инфицированные</button>
  <button class="status-btn disabled">Черепно-мозговые травмы</button>
</div>

<script>
  // Принудительное обновление страницы, если она загружена из кэша
  window.addEventListener('pageshow', function(event) {
    if (event.persisted) {
      window.location.reload();
    }
  });
</script>

</body>
</html>
