        { name: "Функциональные нарушения кишечника неуточненные", internalCode: "2238", mkb: "K59.9", desc: "" },
        { name: "Холангит", internalCode: "1516", mkb: "K83.0", desc: "" },
        { name: "Хронический гастрит неуточненный", internalCode: "2879", mkb: "K29.5", desc: "" },
        { name: "Хронический гепатит, не уточненный", internalCode: "1511", mkb: "K73.9", desc: "" },
        { name: "Хронический панкреатит алкогольной этиологии", internalCode: "1518", mkb: "K86.0", desc: "" },
        { name: "Язва двенадцатиперстной кишки не уточненная как острая или хроническая без кровотечения или прободения", internalCode: "2222", mkb: "K26.9", desc: "" },
        { name: "Язва двенадцатиперстной кишки хроническая без кровотечения или прободения", internalCode: "2221", mkb: "K26.7", desc: "" },
        { name: "Язва двенадцатиперстной кишки хроническая или неуточненная с кровотечением", internalCode: "1481", mkb: "K26.4", desc: "" },
        { name: "Язва двенадцатиперстной кишки хроническая или неуточненная с прободением", internalCode: "2220", mkb: "K26.5", desc: "" },
        { name: "Язва желудка не уточненная как острая или хроническая без кровотечения или прободения", internalCode: "2219", mkb: "K25.9", desc: "" },

    ];

    // Сортировка по алфавиту по названию заболевания
    digestData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function render() {
        const grid = document.getElementById('digestGrid');
        if (!grid) return;
        grid.innerHTML = '';
        digestData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            const titleDiv = document.createElement('div');
            titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'disease-name';
            nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);

            const codeBlockDiv = document.createElement('div');
            codeBlockDiv.className = 'code-block';

            const mkbSpan = document.createElement('div');
            mkbSpan.className = 'mkb-line';
            mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codeBlockDiv.appendChild(mkbSpan);

            const innerSpan = document.createElement('div');
            innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codeBlockDiv.appendChild(innerSpan);

            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div');
                descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }

            card.appendChild(titleDiv);
            card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }

    render();
</script>

</html>
