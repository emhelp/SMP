<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Консилиумы СМП</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.8rem;
      color: #1e2f47;
    }
    .consilium-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }
    .consilium-btn {
      background: #0f1446; /* темно-синий */
      color: white;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      transition: background 0.2s;
    }
    .consilium-btn:hover {
      background: #3949ab;
    }
    @media (max-width: 600px) {
      .consilium-btn { font-size: 0.95rem; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <h1>Консилиумы СМП</h1>

  <div class="consilium-container">
    <button class="consilium-btn" onclick="window.location.href='responsible-doctor.html'">С ответственным врачом смены</button>
    <button class="consilium-btn" onclick="window.open('2026-03-21 18.08.19.jpg', '_blank')">
  При отказах от медэвакуации на ОКС/ОНМК
</button>
    <button class="consilium-btn" onclick="window.location.href='diagnosis-change.html'">При изменении диагноза на повторном вызове</button>
    <button class="consilium-btn" onclick="window.location.href='obstetrician.html'">С акушером-гинекологом</button>
    <button class="consilium-btn" onclick="window.location.href='psychiatrist.html'">С психиатром</button>
    <button class="consilium-btn" onclick="window.location.href='toxicologist.html'">С токсикологом</button>
    <button class="consilium-btn" onclick="window.location.href='resuscitator.html'">С реаниматологом</button>
  </div>

</body>
</html>
