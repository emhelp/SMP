  body {

    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;

    text-align: center;

    gap: 10px;
    width: 100%;
    max-width: 500px;

  }

  .surgery-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .surgery-btn:hover {
    background: #3949ab;
  }

  .surgery-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .surgery-menu {
      max-width: 90%;
    }
    .surgery-btn {
      font-size: 0.9rem;
    }
  }
</style>
