<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Калькулятор: Размер ларингеальной трубки</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e2f47">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #dce3ec 100%);
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .calculator-card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .card-header {
            background: #1e2f47;
            background-image: linear-gradient(115deg, #142a3b, #1d3f55);
            padding: 1.8rem 2rem;
            color: white;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .card-header h1 span {
            background: rgba(255,255,255,0.2);
            font-size: 0.9rem;
            padding: 5px 14px;
            border-radius: 60px;
            font-weight: 500;
        }

        .card-header p {
            margin-top: 12px;
            opacity: 0.85;
            font-size: 0.95rem;
            border-left: 3px solid #5f9bc2;
            padding-left: 16px;
            text-align: left;
        }

        .card-content {
            padding: 2rem;
        }

        .prompt-text {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f4a66;
            background: #f6fafd;
            padding: 14px 12px;
            border-radius: 60px;
            margin-bottom: 32px;
            border: 1px solid #d4e2f0;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .patient-btn {
            background: #f6fafd;
            border: 2px solid #d4e2f0;
            padding: 16px 10px;
            border-radius: 44px;
            font-size: 1rem;
            font-weight: 600;
            color: #1f4a66;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            line-height: 1.3;
            font-family: inherit;
        }

        .patient-btn:hover {
            background: #eef2f7;
            border-color: #1f6e9c;
            transform: translateY(-3px);
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.15);
        }

        .patient-btn:active {
            transform: translateY(1px);
        }

        .result-area {
            background: #f6fafd;
            border-radius: 28px;
            padding: 1.5rem;
            border-left: 6px solid #1f6e9c;
        }

        .result-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            color: #6f8eaa;
            text-align: center;
            margin-bottom: 12px;
        }

        .result-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 28px;
            align-items: baseline;
            margin: 10px 0 8px;
        }

        .size-box {
            text-align: center;
            background: #ffffff;
            border-radius: 64px;
            padding: 14px 28px;
            min-width: 150px;
            border: 1px solid #d4e2f0;
        }

        .size-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1f4a66;
            letter-spacing: 0.5px;
        }

        .size-value {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            color: #1a4d6b;
        }

        .color-box {
            text-align: center;
            background: #ffffff;
            border-radius: 64px;
            padding: 14px 28px;
            min-width: 170px;
            border: 1px solid #d4e2f0;
        }

        .color-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1f4a66;
        }

        .color-value {
            font-size: 1.8rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 6px;
        }

        .color-badge {
            width: 32px;
            height: 32px;
            border-radius: 100%;
            display: inline-block;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .color-name {
            font-weight: 700;
            text-transform: capitalize;
            color: #1f3a4b;
        }

        .footnote {
            text-align: center;
            font-size: 0.7rem;
            color: #6f8eaa;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #e2ecf3;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .card-header {
                padding: 1.2rem;
            }
            .card-header h1 {
                font-size: 1.3rem;
            }
            .card-header p {
                font-size: 0.8rem;
            }
            .card-content {
                padding: 1rem;
            }
            .size-value {
                font-size: 2.5rem;
            }
            .color-value {
                font-size: 1.4rem;
            }
            .patient-btn {
                padding: 12px 8px;
                font-size: 0.9rem;
            }
            .result-details {
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
            }
            .size-box, .color-box {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .prompt-text {
                font-size: 1rem;
            }
            .size-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="calculator-card">
    <div class="card-header">
        <h1>
            📏 Ларингеальная трубка
            <span>размер + цвет</span>
        </h1>
        <p>Калькулятор соответствия размера ларингеальной трубки в зависимости от веса и роста пациента</p>
    </div>
    <div class="card-content">
        <div class="prompt-text">
            👶 Выберите параметры пациента
        </div>

        <div class="buttons-grid">
            <button class="patient-btn" data-key="newborn">👶 Новорожденные, весом менее 5 кг</button>
            <button class="patient-btn" data-key="child5_12">🧒 Дети, весом от 5 до 12 кг</button>
            <button class="patient-btn" data-key="child12_25">🧑 Дети, весом от 12 до 25 кг</button>
            <button class="patient-btn" data-key="child125_150">📏 Дети, ростом от 125 до 150 см</button>
            <button class="patient-btn" data-key="adult_less150">🧑‍⚕️ Взрослые, ростом менее 150 см</button>
            <button class="patient-btn" data-key="adult155_180">👨‍⚕️ Взрослые, ростом от 155 до 180 см</button>
            <button class="patient-btn" data-key="adult_more180">👨‍🦰 Взрослые, ростом более 180 см</button>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-label">🔍 Рекомендованный размер</div>
            <div class="result-details" id="resultDetails">
                <div class="size-box">
                    <div class="size-label">Размер трубки</div>
                    <div class="size-value" id="tubeSizeValue">—</div>
                </div>
                <div class="color-box" id="colorBox">
                    <div class="color-label">Цвет коннектора</div>
                    <div class="color-value" id="colorValueDisplay">
                        <span class="color-badge" id="colorBadge" style="background-color: #cfddeb;"></span>
                        <span class="color-name" id="colorNameText">Не выбран</span>
                    </div>
                </div>
            </div>
            <div class="footnote">
                * На основании клинических рекомендаций (размер / цвет)
            </div>
        </div>
    </div>
</div>

<script>
    const sizeMapping = {
        newborn: {
            label: "Новорожденные, весом менее 5 кг",
            size: "0",
            colorName: "Прозрачный",
            colorCode: "#E0E7F1"
        },
        child5_12: {
            label: "Дети, весом от 5 до 12 кг",
            size: "1",
            colorName: "Белый",
            colorCode: "#F5F5F5"
        },
        child12_25: {
            label: "Дети, весом от 12 до 25 кг",
            size: "2",
            colorName: "Зеленый",
            colorCode: "#2E7D32"
        },
        child125_150: {
            label: "Дети, ростом от 125 до 150 см",
            size: "2,5",
            colorName: "Оранжевый",
            colorCode: "#FF9800"
        },
        adult_less150: {
            label: "Взрослые, ростом менее 150 см",
            size: "3",
            colorName: "Желтый",
            colorCode: "#FFD966"
        },
        adult155_180: {
            label: "Взрослые, ростом от 155 до 180 см",
            size: "4",
            colorName: "Красный",
            colorCode: "#D32F2F"
        },
        adult_more180: {
            label: "Взрослые, ростом более 180 см",
            size: "5",
            colorName: "Фиолетовый",
            colorCode: "#9C27B0"
        }
    };

    function updateResult(patientKey) {
        const data = sizeMapping[patientKey];
        if (!data) return;

        const tubeSizeElement = document.getElementById('tubeSizeValue');
        const colorNameSpan = document.getElementById('colorNameText');
        const colorBadge = document.getElementById('colorBadge');
        
        tubeSizeElement.textContent = data.size;
        colorNameSpan.textContent = data.colorName;
        
        if (data.colorName === "Прозрачный") {
            colorBadge.style.background = "linear-gradient(135deg, #f0f4fa, #d9e2ef)";
            colorBadge.style.border = "1px solid #a0b8d0";
        } else {
            colorBadge.style.backgroundColor = data.colorCode;
            colorBadge.style.border = "none";
        }
        
        const resultArea = document.getElementById('resultArea');
        resultArea.style.transform = 'scale(1.01)';
        setTimeout(() => {
            if (resultArea) resultArea.style.transform = '';
        }, 180);
    }

    const buttons = document.querySelectorAll('.patient-btn');
    buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const key = btn.getAttribute('data-key');
            if (key && sizeMapping[key]) {
                updateResult(key);
                btn.style.backgroundColor = "#e8f0fe";
                setTimeout(() => {
                    btn.style.backgroundColor = "";
                }, 150);
            } else {
                console.warn("Неизвестный ключ пациента", key);
            }
        });
    });

    const style = document.createElement('style');
    style.textContent = `
        .patient-btn:focus-visible {
            outline: 3px solid #1f6e9c;
            outline-offset: 2px;
        }
        .color-badge {
            transition: background 0.2s;
        }
        .result-area {
            transition: transform 0.12s ease-out;
        }
    `;
    document.head.appendChild(style);
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/SMP/sw.js')
            .then(reg => console.log('✅ Сервис-воркер зарегистрирован:', reg))
            .catch(err => console.error('❌ Ошибка регистрации:', err));
    }
</script>
</body>
</html>
