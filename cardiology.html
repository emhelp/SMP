<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кардиология</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .cardio-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .cardio-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .cardio-btn:hover {
    background: #3949ab;
  }

  .cardio-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .cardio-menu {
      max-width: 90%;
    }
    .cardio-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>Кардиологические заболевания</h1>

<div class="cardio-menu">
  <button class="cardio-btn" onclick="window.location.href='atrial_fibrillation.html'">Аритмия (фибрилляция предсердий)</button>
  <button class="cardio-btn" onclick="window.location.href='atrial_flutter.html'">Аритмия (трепетание предсердий)</button>
  <button class="cardio-btn" onclick="window.location.href='atherosclerotic_cardiosclerosis.html'">Атеросклеротический кардиосклероз</button>
  <button class="cardio-btn" onclick="window.location.href='hypertension_stage2.html'">Гипертоническая болезнь 2 стадии</button>
  <button class="cardio-btn" onclick="window.location.href='hypertension_stage2_crisis.html'">Гипертоническая болезнь 2 стадии. Криз</button>
  <button class="cardio-btn" onclick="window.location.href='myocardial_infarction.html'">Инфаркт с подъемом ST</button>
  <button class="cardio-btn" onclick="window.location.href='cardiomyopathy.html'">Кардиомиопатия алкогольная с ХСН</button>
  <button class="cardio-btn" onclick="window.location.href='supraventricular_tachycardia.html'">Наджелудочковая тахикардия</button>
  <button class="cardio-btn" onclick="window.location.href='unstable_angina.html'">Нестабильная стенокардия</button>
  <button class="cardio-btn" onclick="window.location.href='hypotension.html'">Низкое артериальное давление</button>
  <button class="cardio-btn" onclick="window.location.href='pulmonary_edema.html'">Отек легких</button>
  <button class="cardio-btn" onclick="window.location.href='elevated_bp_no_htn.html'">Повышенное артериальное давление без гипертонической болезни</button>
  <button class="cardio-btn" onclick="window.location.href='aortic_dissection.html'">Расслаивающаяся аневризма аорты</button>
  <button class="cardio-btn" onclick="window.location.href='sinus_tachycardia.html'">Синусовая тахикардия</button>
  <button class="cardio-btn" onclick="window.location.href='sss_syndrome.html'">Синдром слабости синусового узла (СССУ)</button>
  <button class="cardio-btn" onclick="window.location.href='pulmonary_embolism.html'">Тромбоэмболия легочной артерии (ТЭЛА)</button>
  <button class="cardio-btn" onclick="window.location.href='chf.html'">Хроническая сердечная недостаточность (ХСН)</button>
  <button class="cardio-btn" onclick="window.location.href='extrasystole.html'">Экстрасистолия</button>
</div>

</body>
</html>
