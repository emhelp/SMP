<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ТРАВМЫ связки/мышцы</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .injury-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .injury-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .injury-btn:hover {
    background: #3949ab;
  }

  .injury-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .injury-menu {
      max-width: 90%;
    }
    .injury-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>ТРАВМЫ связки/мышцы</h1>

<div class="injury-menu">
  <div class="section-header">📌 ПОЗВОНОЧНИК</div>
  <button class="injury-btn" onclick="window.location.href='lumbar_ligament_capsule_injury.html'">Повреждение капсульно-связочного аппарата поясничного отдела позвоночника</button>
  <button class="injury-btn" onclick="window.location.href='posttraumatic_cervical_myositis.html'">Посттравматический шейный миозит</button>

  <div class="section-header">📌 ПЛЕЧЕВОЙ СУСТАВ И НАДОСТНАЯ МЫШЦА</div>
  <button class="injury-btn" onclick="window.location.href='supraspinatus_muscle_injury_right.html'">Повреждение надостной мышцы справа</button>
  <button class="injury-btn" onclick="window.location.href='shoulder_joint_capsule_ligament_injury.html'">Повреждение сумочно-связочного аппарата правого плечевого сустава</button>

  <div class="section-header">📌 ПЛЕЧО (ДВУГЛАВАЯ МЫШЦА И СУХОЖИЛИЯ)</div>
  <button class="injury-btn" onclick="window.location.href='biceps_brachii_long_head_avulsion_right.html'">Отрыв сухожилия длинной головки двуглавой мышцы правого плеча</button>
  <button class="injury-btn" onclick="window.location.href='biceps_brachii_tendon_rupture.html'">Разрыв сухожилия длинной головки двуглавой мышцы плеча</button>
  <button class="injury-btn" onclick="window.location.href='biceps_brachii_partial_injury.html'">Частичное повреждение двуглавой мышцы плеча</button>

  <div class="section-header">📌 ЛОКТЕВОЙ СУСТАВ</div>
  <button class="injury-btn" onclick="window.location.href='elbow_ligament_injury.html'">Повреждение связок локтевого сустава</button>

  <div class="section-header">📌 ЛУЧЕЗАПЯСТНЫЙ СУСТАВ</div>
  <button class="injury-btn" onclick="window.location.href='wrist_ligament_injury.html'">Повреждение связок лучезапястного сустава</button>
  <button class="injury-btn" onclick="window.location.href='left_wrist_ligament_sprain.html'">Растяжение связок левого лучезапястного сустава</button>

  <div class="section-header">📌 КИСТЬ И ПАЛЬЦЫ</div>
  <button class="injury-btn" onclick="window.location.href='finger_extensor_tendon_avulsion_distal.html'">Закрытое повреждение (отрыв) сухожилия разгибателя пальца кисти на уровне дистального межфалангового сустава</button>
  <button class="injury-btn" onclick="window.location.href='finger_extensor_tendon_avulsion_proximal.html'">Закрытое повреждение (отрыв) сухожилия разгибателя пальца кисти на уровне проксимального межфалангового сустава</button>
  <button class="injury-btn" onclick="window.location.href='finger_interphalangeal_ligament_injury.html'">Повреждение связок межфалангового сустава пальца кисти</button>
  <button class="injury-btn" onclick="window.location.href='left_hand_extensor_tendon_rupture_iii_finger.html'">Подкожный разрыв сухожилия разгибателя III пальца левой кисти</button>

  <div class="section-header">📌 ТАЗОБЕДРЕННЫЙ СУСТАВ</div>
  <button class="injury-btn" onclick="window.location.href='right_hip_capsule_ligament_injury.html'">Повреждение капсульно-связочного аппарата правого тазобедренного сустава</button>

  <div class="section-header">📌 БЕДРО (ЧЕТЫРЕХГЛАВАЯ МЫШЦА)</div>
  <button class="injury-btn" onclick="window.location.href='left_quadriceps_tendon_rupture.html'">Закрытый дегенеративный подкожный разрыв сухожилия четырехглавой мышцы левого бедра</button>

  <div class="section-header">📌 КОЛЕННЫЙ СУСТАВ</div>
  <button class="injury-btn" onclick="window.location.href='medial_meniscus_injury_right_block_hemarthrosis.html'">Повреждение внутреннего мениска правого коленного сустава. Блокада сустава. Гемартроз</button>
  <button class="injury-btn" onclick="window.location.href='medial_collateral_ligament_injury.html'">Повреждение внутренней боковой связки коленного сустава</button>
  <button class="injury-btn" onclick="window.location.href='lateral_collateral_anterior_cruciate_ligament_injury_right_hemarthrosis.html'">Повреждение наружной боковой и передней крестообразной связок правого коленного сустава. Гемартроз</button>
  <button class="injury-btn" onclick="window.location.href='right_medial_meniscus_rupture.html'">Разрыв внутреннего мениска правого коленного сустава</button>
  <button class="injury-btn" onclick="window.location.href='right_medial_collateral_ligament_rupture.html'">Разрыв внутренней боковой связки правого коленного сустава</button>
  <button class="injury-btn" onclick="window.location.href='left_anterior_cruciate_ligament_rupture.html'">Разрыв передней крестообразной связки левого коленного сустава</button>
  <button class="injury-btn" onclick="window.location.href='right_medial_collateral_ligament_partial_injury.html'">Частичное повреждение внутренней боковой связки правого коленного сустава</button>

  <div class="section-header">📌 ГОЛЕНОСТОПНЫЙ СУСТАВ</div>
  <button class="injury-btn" onclick="window.location.href='right_ankle_ligament_injury.html'">Повреждение связок правого голеностопного сустава</button>
  <button class="injury-btn" onclick="window.location.href='ankle_ligament_sprain.html'">Растяжение связок голеностопного сустава</button>

  <div class="section-header">📌 СТОПА</div>
  <button class="injury-btn" onclick="window.location.href='right_foot_ligament_injury.html'">Повреждение связочного аппарата правой стопы</button>
</div>

</body>
</html>
