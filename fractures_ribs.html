<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПЕРЕЛОМЫ гр/клетка</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .fracture-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .fracture-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .fracture-btn:hover {
    background: #3949ab;
  }

  .fracture-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .fracture-menu {
      max-width: 90%;
    }
    .fracture-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>ПЕРЕЛОМЫ гр/клетка</h1>

<div class="fracture-menu">
  <div class="section-header">📌 ПЕРЕЛОМЫ РЁБЕР</div>
  <button class="fracture-btn" onclick="window.location.href='rib_4_right.html'">4 ребра справа</button>
  <button class="fracture-btn" onclick="window.location.href='rib_5_right_rib_6_left.html'">5 ребра справа и 6 ребра слева</button>
  <button class="fracture-btn" onclick="window.location.href='rib_5_right_lung_injury_tension_pneumothorax_hemothorax_subcutaneous_emphysema.html'">5 ребра справа. Ранение правого легкого. Напряженный клапанный пневмоторакс. Гемоторакс. Подкожная эмфизема</button>
  <button class="fracture-btn" onclick="window.location.href='rib_8_left.html'">8 ребра слева</button>
  <button class="fracture-btn" onclick="window.location.href='rib_8_left_complicated_hemopneumothorax_subcutaneous_emphysema.html'">8 ребра слева, осложнённый гемопневмотораксом и подкожной эмфиземой</button>

  <div class="section-header">📌 ПЕРЕЛОМЫ ГРУДИНЫ</div>
  <button class="fracture-btn" onclick="window.location.href='sternum.html'">Грудины</button>
  <button class="fracture-btn" onclick="window.location.href='sternum_displaced.html'">Грудины со смещением</button>
</div>

</body>
</html>
