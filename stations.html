        { id: "55", name: "Подстанция №55", address: "улица Академика Черенкова, 4, 108828, Троицк, Троицк гор. округ", phones: [], mapLink: "https://2gis.ru/moscow/geo/70000001030152928" },

        { id: "60", name: "Подстанция №60", address: "2-я Вольская ул., 15, Некрасовка, Москва, 111674", phones: [], mapLink: "https://2gis.ru/moscow/geo/70000001038557040/37.927741,55.687477" },
        { id: "61", name: "Подстанция №61", address: "ММКЦ Коммунарка, улица Сосенский Стан, 8 ст9, 108814, пос. Коммунарка, Коммунарка", phones: [], mapLink: "https://2gis.ru/moscow/geo/70000001047869782/37.467228,55.565318" },

        { id: "63", name: "Подстанция №63", address: "улица Маршала Савицкого, 19, 117148, Москва, Щербинка", phones: [], mapLink: "https://2gis.ru/moscow/geo/70000001079644346/37.596070,55.506334" }
    ];

    // Обогащаем каждую станцию geoId
    stationsList.forEach(station => {
        station.geoId = extractGeoId(station.mapLink);
    });

    // Генерируем кнопки (только номера / пометка для поста)
    const buttonsContainer = document.getElementById('stations-buttons');
    stationsList.forEach(station => {
        const btn = document.createElement('button');
        btn.className = 'station-btn';
        // Отображаем номер: для подстанции просто id, для поста "31п"
        if (station.id === '31post') {
            btn.textContent = '31п';
        } else {
            btn.textContent = station.id;
        }
        btn.dataset.id = station.id;
        btn.setAttribute('aria-label', `Подстанция номер ${station.id === '31post' ? 'пост 31' : station.id}`);
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            openModal(station.id);
        });
        buttonsContainer.appendChild(btn);
    });

    // Функция открытия модального окна с детальной информацией
    function openModal(stationId) {
        const station = stationsList.find(s => s.id === stationId);
        if (!station) return;

        const modal = document.getElementById('stationModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');

        // Устанавливаем заголовок
        modalTitle.textContent = station.name;

        // Формируем блок телефонов
        let phonesHtml = '';
        if (station.phones && station.phones.length > 0) {
            if (station.phones.length === 1) {
                const cleanPhone = station.phones[0].replace(/[^0-9+]/g, '');
                phonesHtml = `<a href="tel:${cleanPhone}" style="color:#c62828; font-weight:600; text-decoration:none;">${station.phones[0]}</a>`;
            } else {
                phonesHtml = '<ul class="phone-list-modal">';
                station.phones.forEach(phone => {
                    const cleanPhone = phone.replace(/[^0-9+]/g, '');
                    phonesHtml += `<li><a href="tel:${cleanPhone}">${phone}</a></li>`;
                });
                phonesHtml += '</ul>';
            }
        } else {
            phonesHtml = '<span style="color:#8a99b0;">телефон не указан</span>';
        }

        // Ссылки на карту
        let mapLinksHtml = '';
        if (station.geoId) {
            const webLink = station.mapLink;
            const appLink = `dgis://2gis.ru/geo/${station.geoId}`;
            mapLinksHtml = `
                <div class="map-links-modal">
                    <a href="${webLink}" target="_blank" rel="noopener noreferrer" class="map-link-modal">🌍 Открыть в браузере</a>
                    <a href="${appLink}" class="map-link-modal app-link-modal">📱 Открыть в приложении 2ГИС</a>
                </div>
            `;
        } else {
            // если ссылка не 2ГИС (Google Maps или иная)
            mapLinksHtml = `
                <div class="map-links-modal">
                    <a href="${station.mapLink}" target="_blank" rel="noopener noreferrer" class="map-link-modal">🗺️ Открыть на карте</a>
                </div>
            `;
        }

        // Наполняем контент модалки
        modalBody.innerHTML = `
            <div class="info-row-modal">
                <div class="info-label-modal">📍 Адрес:</div>
                <div class="info-value-modal">${station.address}</div>
            </div>
            <div class="info-row-modal">
                <div class="info-label-modal">📞 Телефон${station.phones && station.phones.length > 1 ? 'ы' : ''}:</div>
                <div class="info-value-modal">${phonesHtml}</div>
            </div>
            <div class="divider-modal"></div>
            <div class="info-row-modal">
                <div class="info-label-modal">🗺️ Как добраться:</div>
                <div class="info-value-modal">${mapLinksHtml}</div>
            </div>
            ${station.id === '31post' ? '<div style="margin-top:12px; font-size:0.8rem; color:#6c757d;">ℹ️ Пост является дополнительной точкой базирования бригад.</div>' : ''}
        `;

        // Показываем модальное окно
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // предотвращаем скролл фона
    }

    // Закрытие модального окна
    function closeModal() {
        const modal = document.getElementById('stationModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
    }

    // Обработчики закрытия
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    // Закрытие по клику на фон (оверлей)
    const modalOverlay = document.getElementById('stationModal');
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) {
            closeModal();
        }
    });
    // Закрытие по Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
            closeModal();
        }
    });
</script>
