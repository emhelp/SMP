<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ВЫВИХИ</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .dislocation-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .dislocation-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .dislocation-btn:hover {
    background: #3949ab;
  }

  .dislocation-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .dislocation-menu {
      max-width: 90%;
    }
    .dislocation-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>ВЫВИХИ</h1>

<div class="dislocation-menu">
  <div class="section-header">📌 ПЛЕЧЕВОЙ ПОЯС И ГРУДНАЯ КЛЕТКА</div>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_clavicle.html'">Ключица</button>

  <div class="section-header">📌 ПОЗВОНОЧНИК</div>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_vertebrae.html'">Позвонки</button>

  <div class="section-header">📌 ЧЕЛЮСТЬ</div>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_jaw.html'">Челюсть</button>

  <div class="section-header">📌 ВЕРХНЯЯ КОНЕЧНОСТЬ</div>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_humeral_head.html'">Головка плечевой кости</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_forearm.html'">Предплечье</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_radial_head.html'">Головка лучевой кости</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_wrist.html'">Кисть</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_metacarpal.html'">Пястная кость</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_finger.html'">Пальцы кисти</button>

  <div class="section-header">📌 НИЖНЯЯ КОНЕЧНОСТЬ</div>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_femoral_head.html'">Головка бедра</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_hip.html'">Бедро</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_leg.html'">Голень</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_patella.html'">Надколенник</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_foot.html'">Стопа</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_metatarsal.html'">Плюсневая кость</button>
  <button class="dislocation-btn" onclick="window.location.href='dislocation_toe.html'">Пальцы стопы</button>
</div>

</body>
</html>
