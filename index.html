<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скорая помощь</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  
  <!-- ОТКЛЮЧЕНИЕ КЭШИРОВАНИЯ (мета-теги) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<body>

  <div class="header">
    <img src="1712743647196.png" alt="Логотип" class="logo">
    <h1>Скорая помощь</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <nav class="menu">
    <div class="news-block">
      <div class="news-label">ЧТО НОВОГО:</div>
      <div class="news-text">
        <p>⚠️ Начали работу над "Status Localis"</p>
        <p>⛔ Поиск удалили, эксперимент не понравился</p>
        <p>📢 Есть предложения - пишите нам в группе</p>
      </div>
    </div>

    <a href="templates.html" class="menu-btn">ШАБЛОНЫ КАРТ</a>
    <a href="status.html" class="menu-btn">STATUS LOCALIS</a>
    <a href="calculators.html" class="menu-btn">КАЛЬКУЛЯТОРЫ</a>
    <a href="consilium.html" class="menu-btn">КОНСИЛИУМЫ МСК</a>
    <a href="prikaz.html" class="menu-btn">ПРИКАЗЫ МСК</a>
    <a href="stations.html" class="menu-btn gradient">ПОДСТАНЦИИ МСК</a>

    <div class="main-actions">
      <button class="main-btn" id="max-btn">Наш канал в MAX</button>
      <button class="main-btn" id="contact-btn">Написать нам</button>
    </div>
  </nav>

  <!-- Глобальный счетчик посещений -->
  <div class="visit-counter" id="visitCounter">Загрузка...</div>

  <script>
    document.getElementById('max-btn').addEventListener('click', () => {
      window.open('https://max.ru/EMHelp_Channel', '_blank');
    });

    document.getElementById('contact-btn').addEventListener('click', () => {
      window.open('https://vk.com/emhelp', '_blank');
    });
  </script>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzhRi96QOhpFJq0lY72IPmLwICXPCg0Mhb0twuF5R_ZZOUn0vUB6SUk54VUlyTMIQYw/exec';
    
    async function updateVisitCounter() {
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('visitCounter').textContent = 'Ошибка: ' + data.error;
        } else {
          document.getElementById('visitCounter').textContent = `Посещений в этом месяце: ${data.count} (${data.month})`;
        }
      } catch (err) {
        document.getElementById('visitCounter').textContent = 'Ошибка загрузки: ' + err.message;
      }
    }
    
    updateVisitCounter();
  </script>

  <!-- ========== ПРИНУДИТЕЛЬНОЕ ОБНОВЛЕНИЕ (ТРОЙНАЯ ЗАЩИТА) ========== -->
  <script>
    // 1. Защита от bfcache (кэша навигации)
    window.addEventListener('pageshow', function(event) {
      if (event.persisted) {
        window.location.reload();
      }
    });
    
    // 2. Защита от кэширования при возврате через историю
    window.addEventListener('load', function() {
      const timestamp = Date.now();
      const currentUrl = new URL(window.location.href);
      
      // Если нет параметра _t в URL — добавляем и перезагружаем
      if (!currentUrl.searchParams.has('_t')) {
        currentUrl.searchParams.set('_t', timestamp);
        window.location.replace(currentUrl.href);
      }
    });
    
    // 3. Добавляем параметр _t ко всем внутренним ссылкам
    (function() {
      const links = document.querySelectorAll('a');
      const timestamp = Date.now();
      
      links.forEach(link => {
        const href = link.getAttribute('href');
        // Обрабатываем только внутренние ссылки
        if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('#')) {
          const separator = href.includes('?') ? '&' : '?';
          // Удаляем старый _t если был
          let cleanHref = href.replace(/([?&])_t=\d+/, '$1').replace(/[?&]$/, '');
          // Добавляем новый _t
          link.href = cleanHref + separator + '_t=' + timestamp;
        }
      });
    })();
  </script>
  <!-- ============================================================== -->

</body>
</html>
