<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Шпаргалки СМП</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Глобальный счетчик */
    .visit-counter {
      display: block;          /* обычный блок */
      margin: 20px auto 0;     /* сверху отступ, по центру */
      background: rgba(15,20,70,0.9);
      color: #fff;
      font-size: 14px;
      padding: 5px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      text-align: center;
      max-width: 200px;        /* можно задать ширину */
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="1712743647196.png" alt="Логотип" class="logo">
    <h1>Шпаргалки СМП</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <nav class="menu">
    <a href="templates.html" class="menu-btn">ШАБЛОНЫ КАРТ</a>
    <a href="status.html" class="menu-btn">STATUS LOCALIS</a>
    <a href="calculators.html" class="menu-btn">КАЛЬКУЛЯТОРЫ</a>
    <a href="consilium.html" class="menu-btn">КОНСИЛИУМЫ</a>
    <a href="prikaz.html" class="menu-btn">ПРИКАЗЫ</a>
    <a href="stations.html" class="menu-btn">ПОДСТАНЦИИ МСК</a>

    <div class="main-actions">
      <button class="main-btn" id="max-btn">Наш канал в MAX</button>
      <button class="main-btn" id="contact-btn">Написать нам</button>
    </div>
  </nav>

  <div class="main-content"></div>

  <script>
    // Подсветка активной страницы
    const current = window.location.pathname.split("/").pop();
    document.querySelectorAll('.menu-btn').forEach(btn => { 
      if(btn.getAttribute('href') === current) {
        btn.classList.add('active');
      }
    });

    // MAX
    document.getElementById('max-btn').addEventListener('click', () => {
      window.open('https://max.ru/EMHelp_Channel', '_blank');
    });

    // VK
    document.getElementById('contact-btn').addEventListener('click', () => {
      window.open('https://vk.com/emhelp', '_blank');
    });
  </script>

  <!-- Глобальный счетчик посещений после кнопок -->
  <div class="visit-counter" id="visitCounter">Загрузка...</div>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbwJF-PNDXO1gZrveeVvrptliKixACo6LAhJ0gTRKZiUvrLdsEfD9wTP0PdBPZJeGT_4/exec'; // URL веб-приложения Google Script

    function updateVisitCounter() {
      fetch(url)
        .then(response => response.json())
        .then(data => {
          document.getElementById('visitCounter').textContent =
            `Посещений в этом месяце: ${data.count}`;
        })
        .catch(err => {
          console.error(err);
          document.getElementById('visitCounter').textContent = 'Ошибка загрузки';
        });
    }

    // Обновляем при загрузке страницы
    updateVisitCounter();
  </script>

</body>
</html>
