<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Медицинские калькуляторы</title>
<style>
    body {
        font-family: 'Segoe UI', 'Inter', 'Roboto', sans-serif;
        margin: 0;
        padding: 0;
        background: #f0f2f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        width: 100%;
        text-align: center;
        padding: 1rem 0;
        background: linear-gradient(135deg, #7b2c5e 0%, #5a1e46 100%);
        color: white;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    header h1 {
        margin: 0;
        font-size: 1.8rem;
        font-weight: 700;
    }

    .nav-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        max-width: 600px;
        padding: 1rem;
    }

    .nav-btn {
        width: 100%;
        padding: 14px 0;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background-color: #1f6e9c; /* синий фон */
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s, transform 0.15s;
    }

    .nav-btn:hover {
        background-color: #155080;
        transform: scale(0.98);
    }

    .nav-btn.active {
        background-color: #e53935; /* красная подсветка */
    }

    .content {
        max-width: 1000px;
        width: 100%;
        padding: 1rem;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        margin: 1rem;
        flex: 1;
    }

    footer {
        text-align: center;
        padding: 1rem;
        font-size: 0.75rem;
        color: #6c7a8e;
    }

    @media (max-width: 480px) {
        .nav-btn {
            font-size: 0.9rem;
            padding: 12px 0;
        }
    }
</style>
</head>
<body>

<header>
    <h1>Медицинские калькуляторы</h1>
</header>

<div class="nav-bar">
    <button class="nav-btn" id="algovera-btn">Альговера шоковый индекс</button>
    <button class="nav-btn" id="glasgow-btn">Шкала ком Глазго</button>
    <button class="nav-btn" id="fundus-btn">Высота стояния дна матки</button>
</div>

<div class="content">
    <h2>Добро пожаловать!</h2>
    <p>Выберите калькулятор выше, чтобы открыть соответствующую страницу.</p>
</div>

<footer>
    © 2026 Медицинские калькуляторы
</footer>

<script>
const buttons = [
    {id: 'algovera-btn', href: 'algovera-shock.html'},
    {id: 'glasgow-btn', href: 'glasgow.html'},
    {id: 'fundus-btn', href: 'fundus.html'}
];

buttons.forEach(btn => {
    const element = document.getElementById(btn.id);
    if (!element) return;

    // Подсветка активной кнопки
    if (window.location.pathname.includes(btn.href)) {
        element.classList.add('active');
    }

    // Переход при клике
    element.addEventListener('click', () => {
        window.location.href = btn.href;
    });
});
</script>

</body>
</html>
