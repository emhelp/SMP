<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скорая помощь</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Глобальный счетчик */
    .visit-counter {
      display: block;
      margin: 20px auto 0; 
      background: rgba(15,20,70,0.9);
      color: #fff;
      font-size: 14px;
      padding: 5px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      text-align: center;
      max-width: 200px;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="1712743647196.png" alt="Логотип" class="logo">
    <h1>Скорая помощь</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <nav class="menu">
    <a href="templates.html" class="menu-btn">ШАБЛОНЫ КАРТ</a>
    <a href="status.html" class="menu-btn">STATUS LOCALIS</a>
    <a href="calculators.html" class="menu-btn">КАЛЬКУЛЯТОРЫ</a>
    <a href="consilium.html" class="menu-btn">КОНСИЛИУМЫ</a>
    <a href="prikaz.html" class="menu-btn">ПРИКАЗЫ</a>
    <a href="stations.html" class="menu-btn">ПОДСТАНЦИИ МСК</a>

    <div class="main-actions">
      <button class="main-btn" id="max-btn">Наш канал в MAX</button>
      <button class="main-btn" id="contact-btn">Написать нам</button>
    </div>
  </nav>

  <div class="main-content"></div>

  <script>
    // Подсветка активной страницы
    const current = window.location.pathname.split("/").pop();
    document.querySelectorAll('.menu-btn').forEach(btn => { 
      if(btn.getAttribute('href') === current) {
        btn.classList.add('active');
      }
    });

    // MAX
    document.getElementById('max-btn').addEventListener('click', () => {
      window.open('https://max.ru/EMHelp_Channel', '_blank');
    });

    // VK
    document.getElementById('contact-btn').addEventListener('click', () => {
      window.open('https://vk.com/emhelp', '_blank');
    });
  </script>

  <!-- Глобальный счетчик посещений после кнопок -->
<div class="visit-counter" id="visitCounter">Загрузка...</div>

<script>
  // URL вашего скрипта (ЗАМЕНИТЕ НА ВАШ!)
  const url = 'https://script.google.com/macros/s/AKfycbz6PvpZKRH1iSr5LgZhddzXkzQVAHR60HODFzOBF65FP0i9vK9sU6AGdXJ5nSkyjL5c6Q/exec';
  
  async function updateVisitCounter() {
    try {
      console.log('Запрос к:', url);
      const response = await fetch(url);
      console.log('Статус ответа:', response.status);
      
      const data = await response.json();
      console.log('Полученные данные:', data);
      
      if (data.error) {
        document.getElementById('visitCounter').textContent = 
          'Ошибка: ' + data.error;
      } else {
        document.getElementById('visitCounter').textContent = 
          `Посещений в этом месяце: ${data.count} (${data.month})`;
      }
    } catch (err) {
      console.error('Ошибка запроса:', err);
      document.getElementById('visitCounter').textContent = 
        'Ошибка загрузки: ' + err.message;
    }
  }
  
  // Обновляем при загрузке страницы
  updateVisitCounter();
</script>

</body>
</html>
