<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Шпаргалки СМП</title>
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    /* Встроенный стиль для полной автономности, можно удалить если используешь style.css */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'Inter', 'Roboto', system-ui, -apple-system, sans-serif;
      background-color: #f8f9fa;
      color: #1e2a3e;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      text-align: center;
    }
    .header .logo {
      width: 120px;
      height: auto;
    }
    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
    }
    .header p {
      font-size: 1rem;
      opacity: 0.8;
    }
    .grid {
      display: flex;
      flex-direction: column; /* одна колонка на всех устройствах */
      gap: 12px;
      padding: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    .card {
      display: block;
      text-align: center;
      padding: 16px;
      background-color: #e0e0e0; /* серый фон по умолчанию */
      color: #1e2a3e;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700; /* жирный шрифт */
      font-size: 1rem;
      transition: background 0.2s;
      cursor: pointer;
    }
    .card:hover {
      background-color: #d0d0d0;
    }
    .card.active {
      background-color: #c62828; /* красный фон */
      color: #ffffff;
    }
    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.6rem;
      }
      .header p {
        font-size: 0.9rem;
      }
      .card {
        font-size: 0.95rem;
        padding: 14px;
      }
    }
    @media (min-width: 1200px) {
      .grid {
        max-width: 500px;
      }
    }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <div class="header">
    <img src="logo.png" class="logo" alt="Логотип">
    <h1>Шпаргалки СМП</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <!-- КНОПКИ -->
  <div class="grid">
    <a href="#" class="card">ШАБЛОНЫ КАРТ</a>
    <a href="#" class="card">АРХИВ КАРТ СМП</a>
    <a href="#" class="card">STATUS LOCALIS</a>
    <a href="#" class="card">КАЛЬКУЛЯТОРЫ</a>
    <a href="#" class="card">КОНСИЛИУМЫ</a>
    <a href="#" class="card">ПРИКАЗЫ</a>
    <a href="#" class="card">ПОДСТАНЦИИ МСК</a>
  </div>

  <script>
    // Скрипт для активной кнопки
    const buttons = document.querySelectorAll('.card');
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>

</body>
</html>
