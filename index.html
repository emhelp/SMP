<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скорая помощь</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  <!-- Отключаем кэширование -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    /* Стили для поиска */
    .search-container {
      max-width: 500px;
      width: 100%;
      margin: 6px auto;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 16px 0;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      transition: all 0.3s ease;
      background: white;
      color: #0f1446;
    }

    .search-input:focus {
      outline: none;
      border-color: #0f1446;
      box-shadow: 0 0 0 2px rgba(15, 20, 70, 0.2);
    }

    .search-input::placeholder {
      color: #0f1446;
      font-weight: bold;
      font-size: 18px;
      opacity: 0.7;
    }

    /* Крестик очистки */
    .search-clear {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #d0d0d0;
      color: #666;
      text-align: center;
      line-height: 22px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      display: none;
      transition: all 0.2s;
    }

    .search-clear:hover {
      background: #e53935;
      color: white;
    }

    .search-clear.show {
      display: block;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #d0d0d0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .search-results.show {
      display: block;
    }

    .search-result-item {
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #f0f0f0;
    }

    .search-result-item:hover {
      background: #f5f5f5;
    }

    .search-result-title {
      font-weight: 600;
      color: #0f1446;
      margin-bottom: 2px;
      font-size: 14px;
    }

    .search-result-title mark {
      background: #ffeb3b;
      padding: 0 2px;
      border-radius: 3px;
    }

    .search-result-path {
      font-size: 10px;
      color: #888;
    }

    .no-results {
      padding: 10px 12px;
      color: #888;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .search-container {
        max-width: 90%;
      }
      .search-input {
        font-size: 16px;
        padding: 14px 0;
      }
      .search-input::placeholder {
        font-size: 16px;
      }
      .search-clear {
        width: 22px;
        height: 22px;
        line-height: 20px;
        font-size: 14px;
        right: 12px;
      }
      .search-results {
        max-height: 300px;
      }
      .search-result-title {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="1712743647196.png" alt="Логотип" class="logo">
    <h1>Скорая помощь</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <nav class="menu">
    <div class="news-block">
      <div class="news-label">ЧТО НОВОГО:</div>
      <div class="news-text">
        <p>⚠️ Начали заполнять "Status Localis"</p>
        <p>🔍 Теперь есть умный поиск по всем 500+ разделам</p>
        <p>✅ Главная страница всегда показывает актуальную версию</p>
      </div>
    </div>

    <!-- Блок поиска -->
    <div class="search-container">
      <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск...">
      <div class="search-clear" id="searchClear">✕</div>
      <div class="search-results" id="searchResults"></div>
    </div>

    <a href="templates.html" class="menu-btn">ШАБЛОНЫ КАРТ</a>
    <a href="status.html" class="menu-btn">STATUS LOCALIS</a>
    <a href="calculators.html" class="menu-btn">КАЛЬКУЛЯТОРЫ</a>
    <a href="consilium.html" class="menu-btn">КОНСИЛИУМЫ МСК</a>
    <a href="prikaz.html" class="menu-btn">ПРИКАЗЫ МСК</a>
    <a href="stations.html" class="menu-btn gradient">ПОДСТАНЦИИ МСК</a>

    <div class="main-actions">
      <button class="main-btn" id="max-btn">Наш канал в MAX</button>
      <button class="main-btn" id="contact-btn">Написать нам</button>
    </div>
  </nav>

  <!-- Глобальный счетчик посещений -->
  <div class="visit-counter" id="visitCounter">Загрузка...</div>

  <script>
    // ПРИНУДИТЕЛЬНОЕ ОБНОВЛЕНИЕ ПРИ КАЖДОМ ОТКРЫТИИ
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      if (!urlParams.has('_t')) {
        const newUrl = window.location.href + (window.location.href.indexOf('?') === -1 ? '?' : '&') + '_t=' + Date.now();
        window.location.replace(newUrl);
        return;
      }
    })();

    document.getElementById('max-btn').addEventListener('click', () => {
      window.open('https://max.ru/EMHelp_Channel', '_blank');
    });

    document.getElementById('contact-btn').addEventListener('click', () => {
      window.open('https://vk.com/emhelp', '_blank');
    });
  </script>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzhRi96QOhpFJq0lY72IPmLwICXPCg0Mhb0twuF5R_ZZOUn0vUB6SUk54VUlyTMIQYw/exec';
    
    async function updateVisitCounter() {
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('visitCounter').textContent = 'Ошибка: ' + data.error;
        } else {
          document.getElementById('visitCounter').textContent = `Посещений в этом месяце: ${data.count} (${data.month})`;
        }
      } catch (err) {
        document.getElementById('visitCounter').textContent = 'Ошибка загрузки: ' + err.message;
      }
    }
    
    updateVisitCounter();
  </script>

  <!-- СКРИПТ ПОИСКА С ПОЛНОЙ БАЗОЙ ДАННЫХ -->
  <script>
    // Медицинские сокращения для поиска
    const medicalAbbreviations = {
      "ХСН": "Хроническая сердечная недостаточность",
      "ХОБЛ": "Хроническая обструктивная болезнь легких",
      "ТИА": "Транзиторная ишемическая атака",
      "ВСД": "Вегетососудистая дистония",
      "ВБН": "Вертебробазилярная недостаточность",
      "СССУ": "Синдром слабости синусового узла",
      "ЖКК": "Желудочно-кишечное кровотечение",
      "ТЭЛА": "Тромбоэмболия легочной артерии",
      "ЧМТ": "Черепно-мозговая травма",
      "ОНМК": "Острое нарушение мозгового кровообращения",
      "ОКС": "Острый коронарный синдром",
      "ДЭП": "Дисциркуляторная энцефалопатия",
      "КИНЭ": "Кишечная инфекция неустановленной этиологии",
      "ИТШ": "Инфекционно-токсический шок",
      "ДВС": "Диссеминированное внутрисосудистое свертывание",
      "ЭКП": "Электрокардиостимулятор",
      "НСиПВ": "Нестероидные противовоспалительные средства",
      "ИМ": "Инфаркт миокарда",
      "ПНМК": "Преходящее нарушение мозгового кровообращения",
      "ЦВБ": "Цереброваскулярная болезнь"
    };

    // ПОЛНАЯ БАЗА ДАННЫХ ВСЕХ СТРАНИЦ
    const allPages = [
      { file: "1_period.html", title: "1 период родов" },
      { file: "abdomen_description.html", title: "Осмотр живота" },
      { file: "abrasion.html", title: "Ссадина" },
      { file: "abscess.html", title: "Абсцесс" },
      { file: "acute_kidney_injury.html", title: "Острая почечная недостаточность" },
      { file: "advanced_resuscitation_team.html", title: "Расширенная реанимация (вдвоем)" },
      { file: "alcohol.html", title: "Алкоголь" },
      { file: "alcohol_consumption.html", title: "Употребление алкоголя" },
      { file: "alcoholic_polyneuropathy.html", title: "Алкогольная полинейропатия" },
      { file: "algovera-shock.html", title: "Альговера шоковый индекс" },
      { file: "anaphylactic_shock.html", title: "Анафилактический шок" },
      { file: "anemia.html", title: "Анемия" },
      { file: "angioedema.html", title: "Отек Квинке" },
      { file: "appendicitis.html", title: "Аппендицит" },
      { file: "bronchial_asthma.html", title: "Бронхиальная астма" },
      { file: "calculators.html", title: "Калькуляторы СМП" },
      { file: "cardiology.html", title: "Кардиология" },
      { file: "chf.html", title: "Хроническая сердечная недостаточность (ХСН)" },
      { file: "cirrhosis.html", title: "Цирроз печени" },
      { file: "coma.html", title: "Кома" },
      { file: "concussion.html", title: "Сотрясение головного мозга" },
      { file: "constatation.html", title: "Констатация" },
      { file: "copd.html", title: "Хроническая обструктивная болезнь легких (ХОБЛ)" },
      { file: "dep_1.html", title: "Дисциркуляторная энцефалопатия 1 степени (ДЭП 1)" },
      { file: "dep_2.html", title: "Дисциркуляторная энцефалопатия 2 степени (ДЭП 2)" },
      { file: "dep_3.html", title: "Дисциркуляторная энцефалопатия 3 степени (ДЭП 3)" },
      { file: "dislocations.html", title: "Вывихи" },
      { file: "fracture_femoral_neck.html", title: "Перелом шейки бедра" },
      { file: "fracture_clavicle.html", title: "Перелом ключицы" },
      { file: "fracture_rib.html", title: "Перелом ребра" },
      { file: "fracture_spine.html", title: "Перелом позвоночника" },
      { file: "gastrointestinal_bleeding.html", title: "Желудочно-кишечное кровотечение (ЖКК)" },
      { file: "head_injury.html", title: "Черепно-мозговая травма (ЧМТ)" },
      { file: "hyperglycemic_coma_type1.html", title: "Гипергликемическая кома" },
      { file: "hypoglycemic_coma_type1.html", title: "Гипогликемическая кома" },
      { file: "hypertension_stage2_crisis.html", title: "Гипертонический криз" },
      { file: "myocardial_infarction.html", title: "Инфаркт миокарда (ИМ)" },
      { file: "pancreatitis.html", title: "Панкреатит" },
      { file: "pneumothorax.html", title: "Пневмоторакс" },
      { file: "pulmonary_edema.html", title: "Отек легких" },
      { file: "pulmonary_embolism.html", title: "Тромбоэмболия легочной артерии (ТЭЛА)" },
      { file: "renal_colic.html", title: "Почечная колика" },
      { file: "status_asthmaticus.html", title: "Астматический статус" },
      { file: "stroke.html", title: "Инсульт (ОНМК)" },
      { file: "surgery.html", title: "Хирургия" },
      { file: "templates.html", title: "Шаблоны карт вызовов" },
      { file: "traumatology.html", title: "Травматология" },
      { file: "urology.html", title: "Урология" }
    ];

    // Создаем базу для поиска
    const searchDatabase = allPages.map(page => {
      const keywords = [page.title.toLowerCase()];
      
      for (const [abbr, full] of Object.entries(medicalAbbreviations)) {
        if (page.title.includes(full) || page.title.includes(abbr)) {
          keywords.push(abbr.toLowerCase());
          keywords.push(full.toLowerCase());
        }
      }
      
      return {
        title: page.title,
        path: page.file,
        keywords: keywords
      };
    });

    // Функция поиска
    function searchPages(query) {
      if (!query || query.length < 1) return [];
      
      const lowerQuery = query.toLowerCase();
      const results = [];
      
      for (const page of searchDatabase) {
        let matched = false;
        
        if (page.title.toLowerCase().includes(lowerQuery)) {
          matched = true;
        }
        
        if (!matched) {
          for (const keyword of page.keywords) {
            if (keyword.includes(lowerQuery)) {
              matched = true;
              break;
            }
          }
        }
        
        if (matched) {
          results.push(page);
        }
      }
      
      return results.slice(0, 15);
    }

    function highlightText(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(regex, '<mark>$1</mark>');
    }

    function displayResults(results, query) {
      const resultsContainer = document.getElementById('searchResults');
      
      if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="no-results">😔 Ничего не найдено. Попробуйте другие слова</div>';
        resultsContainer.classList.add('show');
        return;
      }
      
      resultsContainer.innerHTML = results.map(result => `
        <div class="search-result-item" onclick="window.location.href='${result.path}'">
          <div class="search-result-title">📄 ${highlightText(result.title, query)}</div>
          <div class="search-result-path">${result.path}</div>
        </div>
      `).join('');
      
      resultsContainer.classList.add('show');
    }

    // Очистка поля поиска
    function clearSearch() {
      searchInput.value = '';
      searchResults.classList.remove('show');
      searchClear.classList.remove('show');
      searchInput.focus();
    }

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const searchClear = document.getElementById('searchClear');
    
    if (searchInput) {
      // Показываем/скрываем крестик
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query.length >= 1) {
          const results = searchPages(query);
          displayResults(results, query);
          searchClear.classList.add('show');
        } else {
          searchResults.classList.remove('show');
          searchClear.classList.remove('show');
        }
      });
      
      // Клик по крестику
      searchClear.addEventListener('click', clearSearch);
      
      // Закрыть результаты при клике вне
      document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
          searchResults.classList.remove('show');
        }
      });
      
      // Поиск при нажатии Enter
      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && searchInput.value.trim().length >= 1) {
          const results = searchPages(searchInput.value.trim());
          if (results.length > 0) {
            window.location.href = results[0].path;
          }
        }
      });
    }
  </script>

</body>
</html>
