<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скорая помощь</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA (ПРОГРЕССИВНОЕ ВЕБ-ПРИЛОЖЕНИЕ) -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1446">
  
  <!-- Font Awesome для иконок -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <div class="header">
    <!-- Левая кнопка "Написать нам" -->
    <a href="feedback.html" class="header-btn header-btn-left" id="contact-btn">
      <i class="fas fa-envelope"></i>
    </a>
    
    <!-- Центральный блок с логотипом и названием -->
    <div class="header-center">
      <img src="1712743647196.png" alt="Логотип" class="logo">
      <h1>Скорая помощь</h1>
      <p>Проект EMHelp Group '2026</p>
    </div>
    
    <!-- Правая кнопка "Поделиться" -->
    <button class="header-btn header-btn-right" id="share-btn">
      <i class="fas fa-share-alt"></i>
    </button>
  </div>

  <nav class="menu">
    <div class="news-block">
      <div class="news-label">ЧТО НОВОГО:</div>
      <div class="news-text">
        <p>Добавляем алгоритмы и новые карты в НЕВРОЛОГИЮ. Нашли ошибку? - напишите нам, нажав на кнопку.</p>
      </div>
    </div>

    <a href="install-instruction.html" class="menu-btn info-btn">Как установить приложение?</a>
    <a href="templates.html" class="menu-btn">ШАБЛОНЫ КАРТ</a>
    <a href="status.html" class="menu-btn">STATUS LOCALIS</a>
    <a href="calculators.html" class="menu-btn">КАЛЬКУЛЯТОРЫ</a>
    <a href="kody.html" class="menu-btn">КОДЫ</a>
    <a href="algorithms_apps.html" class="menu-btn gradient">ПРИЛОЖЕНИЯ К АЛГОРИТМАМ</a>
    <a href="grify.html" class="menu-btn burgundy">ГРИФАМ МСК</a>

    <div class="main-actions">
      <button class="main-btn" id="max-btn">Наш канал в MAX</button>
    </div>
  </nav>

  <!-- Глобальный счетчик посещений -->
  <div class="visit-counter" id="visitCounter">Загрузка...</div>

  <script>
    document.getElementById('max-btn').addEventListener('click', () => {
      window.open('https://max.ru/EMHelp_Channel', '_blank');
    });
  </script>

  <script>
    const url = 'https://script.google.com/macros/s/AKfycbzhRi96QOhpFJq0lY72IPmLwICXPCg0Mhb0twuF5R_ZZOUn0vUB6SUk54VUlyTMIQYw/exec';
    
    async function updateVisitCounter() {
      try {
        const response = await fetch(url);
        const data = await response.json();
        
        if (data.error) {
          document.getElementById('visitCounter').textContent = 'Ошибка: ' + data.error;
        } else {
          document.getElementById('visitCounter').textContent = `Посещений в этом месяце: ${data.count} (${data.month})`;
        }
      } catch (err) {
        document.getElementById('visitCounter').textContent = 'Ошибка загрузки: ' + err.message;
      }
    }
    
    updateVisitCounter();
  </script>

  <!-- КНОПКА "ПОДЕЛИТЬСЯ" - НАТИВНЫЙ ШЕРИНГ -->
  <script>
    document.getElementById('share-btn').addEventListener('click', async () => {
      const shareData = {
        title: 'EMHelp - Скорая помощь',
        text: 'Справочник для специалистов скорой помощи. Алгоритмы, калькуляторы, шаблоны карт!',
        url: window.location.href
      };
      
      try {
        if (navigator.share) {
          await navigator.share(shareData);
          console.log('✅ Поделились успешно');
        } else {
          alert('Поделиться можно так: скопируйте ссылку и отправьте друзьям:\n' + window.location.href);
        }
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('❌ Ошибка шеринга:', err);
          alert('Не удалось открыть окно поделиться');
        }
      }
    });
  </script>

  <!-- РЕГИСТРАЦИЯ СЕРВИС-ВОРКЕРА ДЛЯ PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/SMP/sw.js')
        .then(reg => console.log('✅ Сервис-воркер зарегистрирован:', reg))
        .catch(err => console.error('❌ Ошибка регистрации сервис-воркера:', err));
    }
  </script>

</body>
</html>
