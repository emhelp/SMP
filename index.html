<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Медицинские калькуляторы</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', 'Roboto', sans-serif; background:#f2f4f8; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
    .header { display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:20px; }
    .logo { width:120px; height:auto; }
    h1 { font-size:1.8rem; color:#1e2a3e; }
    .buttons-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:16px; width:100%; max-width:800px; }
    .card { display:flex; align-items:center; justify-content:center; gap:8px; background:#e2e8f0; color:#1e2a3e; font-weight:600; font-size:1rem; padding:14px; border-radius:24px; text-decoration:none; text-align:center; transition: all 0.2s ease; cursor:pointer; }
    .card:hover { background:#cbd5e1; transform:translateY(-2px); }
    .card.active, .card.red { background:#c62828; color:white; }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="Логотип" class="logo">
    <h1>Медицинские калькуляторы</h1>
  </div>
  <div class="buttons-grid">
    <a href="calculator1.html" class="card">💉 Калькулятор 1</a>
    <a href="calculator2.html" class="card">🩺 Калькулятор 2</a>
    <a href="calculator3.html" class="card">⚕️ Калькулятор 3</a>
    <a href="stations.html" class="card red">🛑 ПОДСТАНЦИИ МСК</a>
    <a href="calculator4.html" class="card">🧪 Калькулятор 4</a>
    <a href="calculator5.html" class="card">🏥 Калькулятор 5</a>
    <!-- добавляй остальные кнопки здесь -->
  </div>
  <script>
    // Автоматическая установка активной кнопки на текущей странице
    const cards = document.querySelectorAll('.card');
    const currentPage = window.location.pathname.split('/').pop();
    cards.forEach(card => {
      const href = card.getAttribute('href');
      if(href === currentPage) {
        card.classList.add('active');
      }
    });
  </script>
</body>
</html>
