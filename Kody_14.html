        { name: "Рвота новорожденного", internalCode: "1666", mkb: "P92.0", desc: "" },
        { name: "Родовая травма неуточненная", internalCode: "1661", mkb: "P15.9", desc: "" },
        { name: "Сахарный диабет новорожденных", internalCode: "2441", mkb: "P70.2", desc: "" },
        { name: "Сердечно-сосудистые нарушения, возникшие в перинатальном периоде неуточненные", internalCode: "2429", mkb: "P29.9", desc: "" },
        { name: "Симптомы лекарственной абстиненции у новорожденного, обусловленные наркоманией матери", internalCode: "4098", mkb: "P96.1", desc: "синдром у младенца, обусловленный наркоманией матери. Исключено: лекарственные реакции и интоксикации, обусловленные введением матери опиатов и транквилизаторов (P04.0)" },
        { name: "Смерть плода по неуточненной причине", internalCode: "1668", mkb: "P95", desc: "мертвый плод (без дополнительных уточнений), мертворожденный (без дополнительных уточнений)" },
        { name: "Средняя и умеренная асфиксия при рождении", internalCode: "4079", mkb: "P21.1", desc: "синяя асфиксия. Оценка по шкале Апгар 4–7 через 1 минуту после рождения" },
        { name: "Срыгивание и руминация новорожденного", internalCode: "2445", mkb: "P92.1", desc: "" },
        { name: "Стойкое фетальное кровообращение у новорожденного", internalCode: "4085", mkb: "P29.3", desc: "задержка закрытия артериального протока у новорожденного" },
        { name: "Судороги новорожденного", internalCode: "1664", mkb: "P90", desc: "" },
        { name: "Тяжелая асфиксия при рождении", internalCode: "4078", mkb: "P21.0", desc: "белая асфиксия. Асфиксия с оценкой по шкале Апгар 0–3 через 1 минуту после рождения" },
        { name: "Ядерная желтуха неуточненная", internalCode: "2438", mkb: "P57.9", desc: "" }
    ];

    // Удаление дубликатов по internalCode + mkb
    const uniqueData = [];
    const keySet = new Set();
    for (const item of perinatalData) {
        const key = `${item.internalCode}|${item.mkb}`;
        if (!keySet.has(key)) {
            keySet.add(key);
            uniqueData.push(item);
        }
    }

    // Сортировка по алфавиту
    uniqueData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCards(filterText = '') {
        const grid = document.getElementById('perinatalGrid');
        if (!grid) return;
        
        const lowerFilter = filterText.toLowerCase().trim();
        let filtered = uniqueData;
        
        if (lowerFilter !== '') {
            filtered = uniqueData.filter(item => {
                return item.name.toLowerCase().includes(lowerFilter) ||
                       item.mkb.toLowerCase().includes(lowerFilter) ||
                       item.internalCode.includes(lowerFilter) ||
                       (item.desc && item.desc.toLowerCase().includes(lowerFilter));
            });
        }
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">🚫 Ничего не найдено. Попробуйте другой поисковый запрос.</div>`;
            return;
        }
        
        grid.innerHTML = '';
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'disease-name';
            nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);
            
            const codeBlockDiv = document.createElement('div');
            codeBlockDiv.className = 'code-block';
            
            const codesRow = document.createElement('div');
            codesRow.className = 'codes-row';
            
            const mkbSpan = document.createElement('div');
            mkbSpan.className = 'mkb-line';
            mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codesRow.appendChild(mkbSpan);
            
            const innerSpan = document.createElement('div');
            innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codesRow.appendChild(innerSpan);
            
            codeBlockDiv.appendChild(codesRow);
            
            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div');
                descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }
            
            card.appendChild(titleDiv);
            card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderCards(e.target.value);
        });
    }
    
    renderCards();
</script>
</body>
</html>
