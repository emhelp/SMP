<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПЕРЕЛОМЫ н/конечность</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .fracture-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .fracture-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .fracture-btn:hover {
    background: #3949ab;
  }

  .fracture-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .fracture-menu {
      max-width: 90%;
    }
    .fracture-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>ПЕРЕЛОМЫ н/конечность</h1>

<div class="fracture-menu">
  <div class="section-header">📌 ТАЗ</div>
  <button class="fracture-btn" onclick="window.location.href='pelvic_bones_ring_disruption.html'">Кости таза с нарушением кольца</button>
  <button class="fracture-btn" onclick="window.location.href='iliac_wing_marginal_fracture.html'">Краевой перелом крыла подвздошной кости</button>
  <button class="fracture-btn" onclick="window.location.href='pubic_bone.html'">Лонная кость</button>
  <button class="fracture-btn" onclick="window.location.href='asis_avulsion.html'">Отрыв передневерхней ости подвздошной кости</button>

  <div class="section-header">📌 БЕДРЕННАЯ КОСТЬ</div>
  <button class="fracture-btn" onclick="window.location.href='femoral_greater_trochanter_isolated.html'">Большой вертел бедра (изолированный)</button>
  <button class="fracture-btn" onclick="window.location.href='femoral_neck.html'">Шейка бедра</button>
  <button class="fracture-btn" onclick="window.location.href='femoral_upper_third_displaced.html'">Верхняя треть бедренной кости со смещением отломков</button>
  <button class="fracture-btn" onclick="window.location.href='femoral_diaphysis_upper_third.html'">Диафиз бедра в верхней трети</button>
  <button class="fracture-btn" onclick="window.location.href='periprosthetic_subtrochanteric_metadiaphyseal_fracture.html'">Парапротезный подвертельный метадиафизарный перелом бедренной кости</button>

  <div class="section-header">📌 НАДКОЛЕННИК</div>
  <button class="fracture-btn" onclick="window.location.href='patella_displaced.html'">Надколенник со смещением</button>

  <div class="section-header">📌 КОСТИ ГОЛЕНИ</div>
  <button class="fracture-btn" onclick="window.location.href='tibial_plateau_internal.html'">Внутренний мыщелок большеберцовой кости</button>
  <button class="fracture-btn" onclick="window.location.href='tibial_intercondylar_eminence_displaced.html'">Межмыщелковое возвышение большеберцовой кости со смещением</button>
  <button class="fracture-btn" onclick="window.location.href='fibula_upper_third.html'">Верхняя треть малоберцовой кости</button>
  <button class="fracture-btn" onclick="window.location.href='both_leg_bones_diaphysis_middle_third.html'">Диафиз обеих костей средней трети голени</button>
  <button class="fracture-btn" onclick="window.location.href='open_committed_both_leg_bones_middle_lower_third_displaced.html'">Открытый многооскольчатый перелом обеих костей левой голени в средне-нижней трети со смещением отломков</button>

  <div class="section-header">📌 ЛОДЫЖКИ</div>
  <button class="fracture-btn" onclick="window.location.href='lateral_malleolus.html'">Наружная лодыжка</button>
  <button class="fracture-btn" onclick="window.location.href='bimalleolar.html'">Обе лодыжки</button>
  <button class="fracture-btn" onclick="window.location.href='bimalleolar_with_foot_subluxation.html'">Обе лодыжки с подвывихом стопы</button>
  <button class="fracture-btn" onclick="window.location.href='bimalleolar_displaced_phlebothrombosis.html'">Обе лодыжки со смещением. Флеботромбоз</button>

  <div class="section-header">📌 СТОПА</div>
  <button class="fracture-btn" onclick="window.location.href='fifth_metatarsal_base.html'">Основание 5 плюсневой кости</button>
  <button class="fracture-btn" onclick="window.location.href='metatarsal_bones.html'">Плюсневые кости</button>
  <button class="fracture-btn" onclick="window.location.href='calcaneus.html'">Пяточная кость</button>

  <div class="section-header">📌 ПАЛЬЦЫ СТОПЫ</div>
  <button class="fracture-btn" onclick="window.location.href='first_toe_proximal_phalanx.html'">Основная фаланга 1 пальца</button>
</div>

</body>
</html>
