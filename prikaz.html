<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приказы СМП</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      padding: 20px;
    }

    .header h1 {
      font-size: 2rem;
      margin: 5px 0;
    }

    .orders-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 600px;
      padding: 10px;
      box-sizing: border-box;
    }

    .order-btn {
      background-color: #0f1446;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: background 0.2s;
      text-align: left;
    }

    .order-btn:hover { background-color: #3949ab; }

    @media (max-width: 600px) {
      .order-btn { font-size: 0.9rem; }
      .header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Приказы СМП</h1>
  </div>

 <div class="orders-container">
    <button class="order-btn" onclick="window.location.href='ekp.html'">Передача ЭКП</button>
    <button class="order-btn" onclick="window.location.href='alcohol.html'">Выписка спирта</button>
    <button class="order-btn" onclick="window.location.href='methods.html'">Медотходы и профилактика аварийных ситуаций</button>
    <button class="order-btn" onclick="window.location.href='antivich.html'">Аварийные ситуации АнтиВИЧ</button>
    <button class="order-btn" onclick="window.location.href='vitals.html'">Мониторинг витальных функций</button>
    <button class="order-btn" onclick="window.location.href='routing.html'">Изменение маршрутизации пациентов с амбулаторной травмой</button>
    <button class="order-btn" onclick="window.location.href='algorithms.html'">Изменения в результатах Алгоритмов</button>
    <button class="order-btn" onclick="window.location.href='nsipv.html'">Образец применения НСиПВ в карте вызова</button>
</div>

</body>
</html>
