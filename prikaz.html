<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приказы СМП</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f1446;
    }

    .orders-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }

    .order-btn {
      text-decoration: none;
      color: white;
      background: #0f1446;
      padding: 16px 0;
      border-radius: 8px;
      font-weight: bold;
      text-align: center;
      width: 100%;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-family: inherit;
      box-sizing: border-box;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .order-btn:hover {
      background: #3949ab;
    }

    .order-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 600px) {
      .orders-container {
        max-width: 90%;
      }
      .order-btn {
        font-size: 16px;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>

  <h1>Приказы СМП</h1>

  <div class="orders-container">
    <button class="order-btn" onclick="window.location.href='ekp.html'">Передача ЭКП</button>
    <button class="order-btn" onclick="window.location.href='alcohol.html'">Выписка спирта</button>
    <button class="order-btn" onclick="window.location.href='methods.html'">Медотходы и профилактика аварийных ситуаций</button>
    <button class="order-btn" onclick="window.location.href='antivich.html'">Аварийные ситуации АнтиВИЧ</button>
    <button class="order-btn" onclick="window.location.href='vitals.html'">Мониторинг витальных функций</button>
    <button class="order-btn" onclick="window.location.href='routing.html'">Изменение маршрутизации пациентов с амбулаторной травмой</button>
    <button class="order-btn" onclick="window.location.href='algorithms.html'">Изменения в результатах Алгоритмов</button>
    <button class="order-btn" onclick="window.location.href='nsipv.html'">Образец применения НСиПВ в карте вызова</button>
  </div>

</body>
</html>
