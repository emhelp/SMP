<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>Констатация</title>

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 15px;
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      background: #0f1446;
      color: white;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #3949ab;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="title">Констатация</div>

  <button class="btn" onclick="window.location.href='head-amputation.html'">Ампутация головы</button>
  <button class="btn" onclick="window.location.href='body-amputation.html'">Ампутация туловища</button>
  <button class="btn" onclick="window.location.href='more-than-week.html'">Более недели (в лесу)</button>
  <button class="btn" onclick="window.location.href='more-than-hour.html'">Более часа</button>
  <button class="btn" onclick="window.location.href='less-than-hour.html'">Менее часа</button>
  <button class="btn" onclick="window.location.href='burned.html'">Обугленный (пожар)</button>
  <button class="btn" onclick="window.location.href='fall-height.html'">Падение с высоты</button>

  <button class="btn" onclick="window.location.href='train-injury.html'">Поездная (травма)</button>

</div>

</html>
