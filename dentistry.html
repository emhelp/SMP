<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стоматология</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .dentistry-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .dentistry-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .dentistry-btn:hover {
    background: #3949ab;
  }

  .dentistry-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .dentistry-menu {
      max-width: 90%;
    }
    .dentistry-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>Стоматология</h1>

<div class="dentistry-menu">
  <button class="dentistry-btn" onclick="window.location.href='alveolitis.html'">Альвеолит</button>
  <button class="dentistry-btn" onclick="window.location.href='gingivitis.html'">Гингивит</button>
  <button class="dentistry-btn" onclick="window.location.href='glossitis.html'">Глоссит</button>
  <button class="dentistry-btn" onclick="window.location.href='post_extraction_bleeding.html'">Кровотечение после экстракции зуба</button>
  <button class="dentistry-btn" onclick="window.location.href='periodontitis.html'">Пародонтит</button>
  <button class="dentistry-btn" onclick="window.location.href='periostitis.html'">Периостит</button>
  <button class="dentistry-btn" onclick="window.location.href='pulpitis.html'">Пульпит</button>
  <button class="dentistry-btn" onclick="window.location.href='stomatitis.html'">Стоматит</button>
  <button class="dentistry-btn" onclick="window.location.href='traumatic_incomplete_tooth_dislocation.html'">Травматический неполный вывих зуба (шатается)</button>
  <button class="dentistry-btn" onclick="window.location.href='traumatic_complete_tooth_dislocation.html'">Травматический полный вывих зуба (вылетел)</button>
</div>

</body>
</html>
