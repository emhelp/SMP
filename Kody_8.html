        { name: "Флебит и тромбофлебит других локализаций", internalCode: "2877", mkb: "I80.8", desc: "" },
        { name: "Флебит и тромбофлебит поверхностный сосудов нижних конечностей", internalCode: "1411", mkb: "I80.0", desc: "" },
        { name: "Эмболия и тромбоз артерий верхних конечностей", internalCode: "2171", mkb: "I74.2", desc: "" },
        { name: "Эмболия и тромбоз артерий нижних конечностей", internalCode: "2172", mkb: "I74.3", desc: "" },
        { name: "Эмболия и тромбоз брюшной аорты", internalCode: "1409", mkb: "I74.0", desc: "синдром Лериша, синдром бифуркации аорты" },
        { name: "Эмболия и тромбоз других артерий", internalCode: "2174", mkb: "I74.8", desc: "" },
        { name: "Эмболия и тромбоз других уточненных вен", internalCode: "4054", mkb: "I82.8", desc: "" },
        { name: "Эмболия и тромбоз подвздошной артерии", internalCode: "2173", mkb: "I74.5", desc: "" },
        { name: "Эмболия и тромбоз полой вены", internalCode: "2867", mkb: "I82.2", desc: "" },
        { name: "Эссенциальная [первичная] гипертензия", internalCode: "1372", mkb: "I10", desc: "" }
    ];
    
    circulatoryData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function render() {
        const grid = document.getElementById('circulatoryGrid');
        if (!grid) return;
        grid.innerHTML = '';
        circulatoryData.forEach(item => {
            const card = document.createElement('div'); card.className = 'card';
            const titleDiv = document.createElement('div'); titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div'); nameSpan.className = 'disease-name'; nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);
            const codeBlockDiv = document.createElement('div'); codeBlockDiv.className = 'code-block';
            const mkbSpan = document.createElement('div'); mkbSpan.className = 'mkb-line'; mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codeBlockDiv.appendChild(mkbSpan);
            const innerSpan = document.createElement('div'); innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codeBlockDiv.appendChild(innerSpan);
            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div'); descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }
            card.appendChild(titleDiv); card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }
    render();
</script>
