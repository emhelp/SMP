<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Шаблоны карт вызовов</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
    font-size: 28px;
  }

  .template-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .template-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 0;
    border-radius: 12px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 17px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .template-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  }

  .template-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .template-menu {
      max-width: 95%;
    }
    .template-btn {
      font-size: 16px;
      padding: 14px 0;
    }
    h1 {
      font-size: 24px;
    }
  }
</style>
</head>
<body>

<h1>📋 Шаблоны карт вызовов</h1>

<div class="template-menu">
  <button class="template-btn" onclick="window.location.href='obstetrics.html'">Акушерство и гинекология</button>
  <button class="template-btn" onclick="window.location.href='anesthesiology.html'">Анестезиология и реанимация</button>
  <button class="template-btn" onclick="window.location.href='infectious.html'">Инфекционные заболевания</button>
  <button class="template-btn" onclick="window.location.href='cardiology.html'">Кардиология</button>
  <button class="template-btn" onclick="window.location.href='constatation.html'">Констатация</button>
  <button class="template-btn" onclick="window.location.href='neurology.html'">Неврология</button>
  <button class="template-btn" onclick="window.location.href='otolaryngology.html'">Оториноларингология</button>
  <button class="template-btn" onclick="window.location.href='ophthalmology.html'">Офтальмология</button>
  <button class="template-btn" onclick="window.location.href='pediatrics.html'">Педиатрия</button>
  <button class="template-btn" onclick="window.location.href='dentistry.html'">Стоматология</button>
  <button class="template-btn" onclick="window.location.href='therapy.html'">Терапия</button>
  <button class="template-btn" onclick="window.location.href='toxicology.html'">Токсикология</button>
  <button class="template-btn" onclick="window.location.href='traumatology.html'">Травматология</button>
  <button class="template-btn" onclick="window.location.href='urology.html'">Урология</button>
  <button class="template-btn" onclick="window.location.href='surgery.html'">Хирургия</button>
</div>

<script>
  // Регистрация Service Worker для PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ Сервис-воркер зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка регистрации:', err));
  }
</script>

</body>
</html>
