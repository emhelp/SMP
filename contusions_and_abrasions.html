<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>УШИБЫ И ССАДИНЫ</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .injury-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .injury-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .injury-btn:hover {
    background: #3949ab;
  }

  .injury-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .injury-menu {
      max-width: 90%;
    }
    .injury-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>УШИБЫ И ССАДИНЫ</h1>

<div class="injury-menu">
  <div class="section-header">📌 ГОЛОВА</div>
  <button class="injury-btn" onclick="window.location.href='scalp_contusion_subcutaneous_hematoma.html'">Ушиб мягких тканей волосистой части головы, подкожная гематома</button>
  <button class="injury-btn" onclick="window.location.href='face_contusion_abrasions_periorbital_hematoma_right.html'">Ушиб м/тканей и ссадины лица, параорбитальная гематома правого глаза (1-е сутки 6-24 часа)</button>

  <div class="section-header">📌 ШЕЯ</div>
  <button class="injury-btn" onclick="window.location.href='neck_bite_abrasions.html'">Укушенные ссадины шеи (1-е сутки — до 6 часов)</button>

  <div class="section-header">📌 ГРУДНАЯ КЛЕТКА</div>
  <button class="injury-btn" onclick="window.location.href='right_chest_contusion.html'">Ушиб правой половины грудной клетки</button>
  <button class="injury-btn" onclick="window.location.href='right_chest_contusion_and_abrasions.html'">Ушиб и ссадины грудной клетки справа (4-6 сутки)</button>

  <div class="section-header">📌 ПОЛОВЫЕ ОРГАНЫ</div>
  <button class="injury-btn" onclick="window.location.href='external_genitalia_contusion.html'">Ушиб наружных половых органов</button>

  <div class="section-header">📌 ВЕРХНИЕ КОНЕЧНОСТИ</div>
  <button class="injury-btn" onclick="window.location.href='forearm_lower_third_compression_abrasions.html'">Сдавление мягких тканей и ссадины нижней трети предплечий (воздействие наручниками 2 — 3 сутки)</button>
  <button class="injury-btn" onclick="window.location.href='left_hand_palm_contusion.html'">Ушиб ладонной поверхности левой кисти</button>
  <button class="injury-btn" onclick="window.location.href='right_hand_dorsum_contusion.html'">Ушиб тыльной поверхности правой кисти</button>
  <button class="injury-btn" onclick="window.location.href='left_hand_ii_finger_subungual_hematoma.html'">Подногтевая гематома II пальца левой кисти</button>
  <button class="injury-btn" onclick="window.location.href='right_hand_iii_finger_middle_phalanx_contusion.html'">Ушиб средней фаланги III пальца правой кисти</button>

  <div class="section-header">📌 НИЖНИЕ КОНЕЧНОСТИ</div>
  <button class="injury-btn" onclick="window.location.href='knee_contusion.html'">Ушиб коленного сустава</button>
  <button class="injury-btn" onclick="window.location.href='right_knee_contusion_hemarthrosis.html'">Ушиб, гемартроз правого коленного сустава</button>
</div>

</body>
</html>
