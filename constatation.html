<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Констатация</title>

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f1446;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }

    .btn {
      text-decoration: none;
      color: white;
      background: #0f1446;
      padding: 12px 15px;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      width: 100%;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }

    .btn:hover {
      background: #3949ab;
    }

    .btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 600px) {
      .container {
        max-width: 90%;
      }
      .btn {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

<h1>Констатация</h1>

<div class="container">
  <button class="btn" onclick="window.location.href='head-amputation.html'">Ампутация головы</button>
  <button class="btn" onclick="window.location.href='body-amputation.html'">Ампутация туловища</button>
  <button class="btn" onclick="window.location.href='more-than-week.html'">Более недели (в лесу)</button>
  <button class="btn" onclick="window.location.href='more-than-hour.html'">Более 2 часов</button>
  <button class="btn" onclick="window.location.href='less-than-hour.html'">Менее 2 часов</button>
  <button class="btn" onclick="window.location.href='week-in-bath.html'">Неделю в ванне с водой</button>
  <button class="btn" onclick="window.location.href='burned.html'">Обугленный (пожар)</button>
  <button class="btn" onclick="window.location.href='fall-height.html'">Падение с высоты</button>
  <button class="btn" onclick="window.location.href='hanging.html'">Повешение</button>
  <button class="btn" onclick="window.location.href='train-injury.html'">Поездная (травма)</button>
</div>

</body>
</html>
