<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПЕРЕЛОМЫ позвоночник</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .fracture-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .fracture-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .fracture-btn:hover {
    background: #3949ab;
  }

  .fracture-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .fracture-menu {
      max-width: 90%;
    }
    .fracture-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<h1>ПЕРЕЛОМЫ позвоночник</h1>

<div class="fracture-menu">
  <div class="section-header">📌 ШЕЙНЫЙ ОТДЕЛ</div>
  <button class="fracture-btn" onclick="window.location.href='c4_compression_fracture.html'">Компрессионный перелом тела С4 позвонка</button>
  <button class="fracture-btn" onclick="window.location.href='c5_uncomplicated_compression_fracture.html'">Неосложненный компрессионный перелом тела 5 шейного позвонка</button>

  <div class="section-header">📌 ГРУДНОЙ ОТДЕЛ</div>
  <button class="fracture-btn" onclick="window.location.href='t10_t11_compression_fracture_spinal_cord_rupture.html'">Компрессионный перелом тел 10-11 грудных позвонков с полным разрывом спинного мозга</button>

  <div class="section-header">📌 ПОЯСНИЧНЫЙ ОТДЕЛ</div>
  <button class="fracture-btn" onclick="window.location.href='l1_compression_fracture.html'">Компрессионный перелом тела 1 поясничного позвонка</button>
  <button class="fracture-btn" onclick="window.location.href='l2_compression_fracture.html'">Компрессионный перелом тела L2 позвонка</button>
  <button class="fracture-btn" onclick="window.location.href='l2_spinous_process_fracture.html'">Перелом остистого отростка L2 позвонка</button>
  <button class="fracture-btn" onclick="window.location.href='l2_transverse_process_fracture_right.html'">Перелом поперечного отростка L2 позвонка справа</button>
  <button class="fracture-btn" onclick="window.location.href='senile_spondylopathy_l2.html'">Сенильная спондилопатия L2 (нетравматический компрессионный перелом тела позвонка на фоне остеопороза и эндокринной патологии у пожилых лиц)</button>

  <div class="section-header">📌 КОПЧИК</div>
  <button class="fracture-btn" onclick="window.location.href='coccyx_fracture.html'">Перелом копчика</button>
</div>

</body>
</html>
