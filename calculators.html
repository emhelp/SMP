<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькуляторы СМП</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 300px;
      padding: 10px;
      box-sizing: border-box;
      margin-top: 20px;
    }

    .menu-btn {
      text-decoration: none;
      color: white;
      background: #1e2a3e; /* темно-синий */
      padding: 12px 15px;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      width: 100%;
      transition: background 0.2s;
    }

    .menu-btn.active {
      background: #c62828; /* красная подсветка активной кнопки */
    }

    .menu-btn:hover {
      background: #2c3e66;
    }

    @media (max-width: 600px) {
      .menu {
        max-width: 90%;
      }
      .menu-btn {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

  </nav>

  <!-- Раздел калькуляторов -->
