<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькуляторы СМП</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f1446;
    }

    .calc-menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    .calc-btn {
      text-decoration: none;
      color: white;
      background: #0f1446;
      padding: 12px 15px;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      width: 100%;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }

    .calc-btn:hover {
      background: #3949ab;
    }

    .calc-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 600px) {
      .calc-menu {
        max-width: 90%;
      }
      .calc-btn {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <h1>Калькуляторы СМП</h1>

  <div class="calc-menu">
    <button class="calc-btn" data-url="algovera-shock.html">Альговера шоковый индекс</button>
    <button class="calc-btn" data-url="fundal-height.html">Высота стояния дна матки</button>
    <button class="calc-btn" data-url="glasgow-scale.html">Глазго шкала комы</button>
    <button class="calc-btn" data-url="pediatric-norms.html">Детские возрастные нормы</button>
    <button class="calc-btn" data-url="dental-formula.html">Зубная формула</button>
    <button class="calc-btn" data-url="ventilation-modes.html">ИВЛ режимы</button>
    <button class="calc-btn" data-url="intubation.html">Интубации описание</button>
    <button class="calc-btn" data-url="dobutamine-adult.html">Инфузия Добутамина взрослым</button>
    <button class="calc-btn" data-url="dobutamine-child.html">Инфузия Добутамина детям</button>
    <button class="calc-btn" data-url="dopamine-adult.html">Инфузия Допамина взрослым</button>
    <button class="calc-btn" data-url="dopamine-child.html">Инфузия Допамина детям</button>
    <button class="calc-btn" data-url="norepinephrine-adult.html">Инфузия Норэпинефрина взрослым</button>
    <button class="calc-btn" data-url="norepinephrine-child.html">Инфузия Норэпинефрина детям</button>
    <button class="calc-btn" data-url="itls-trauma.html">ITLS протокол травм-осмотра</button>
    <button class="calc-btn" data-url="due-date.html">Калькулятор даты родов</button>
    <button class="calc-btn" data-url="lams-scale.html">LAMS шкала</button>
    <button class="calc-btn" data-url="news2-scale.html">NEWS 2 шкала</button>
    <button class="calc-btn" data-url="odn-kassil.html">ОДН по Кассиль</button>
    <button class="calc-btn" data-url="fontanelle.html">Описание родничков у детей</button>
    <button class="calc-btn" data-url="pain-vas.html">Оценка по шкале боли ВАШ</button>
    <button class="calc-btn" data-url="mg-conversion.html">Пересчёт % в mg</button>
    <button class="calc-btn" data-url="burn-area.html">Площадь ожога</button>
    <button class="calc-btn" data-url="gastric-lavage-adult.html">Промывание желудка взрослым</button>
    <button class="calc-btn" data-url="gastric-lavage-child.html">Промывание желудка детям</button>
    <button class="calc-btn" data-url="rass-scale.html">RASS шкала</button>
    <button class="calc-btn" data-url="iv-infusion-rate.html">Расчет скорости в/в введения</button>
    <button class="calc-btn" data-url="shocks-scale.html">ШОКС шкала</button>
  </div>

  <script>
    document.querySelectorAll('.calc-btn').forEach(button => {
      button.addEventListener('click', function() {
        const url = this.getAttribute('data-url');
        if (url) {
          window.location.href = url;
        }
      });
    });
  </script>

</body>
</html>
