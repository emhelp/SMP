<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Медицинские калькуляторы</title>
<style>
    body {
        font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        background: linear-gradient(145deg, #eef2f7 0%, #dce3ec 100%);
        margin: 0;
        padding: 2rem 1rem;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    .calculator-menu {
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .nav-btn {
        width: 100%;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 600;
        text-align: center;
        border-radius: 50px;
        border: none;
        background-color: #1f6e9c;
        color: #fff;
        cursor: pointer;
        transition: background 0.2s, transform 0.2s;
    }

    .nav-btn:hover {
        background-color: #0f557c;
        transform: scale(0.97);
    }

    @media (max-width: 768px) {
        .calculator-menu {
            max-width: 90%;
        }
    }
</style>
</head>
<body>

<div class="calculator-menu">
    <button class="nav-btn" id="algovera-btn">🩸 Альговера шоковый индекс</button>
    <button class="nav-btn" id="glasgow-btn">🧠 Шкала комы Глазго</button>
    <button class="nav-btn" id="fundus-btn">🤰 Высота стояния дна матки</button>
    <!-- Добавляй сюда новые кнопки по аналогии -->
</div>

<script>
    const buttons = [
        {id: 'algovera-btn', href: 'algovera-shock.html'},
        {id: 'glasgow-btn', href: 'glasgow.html'},
        {id: 'fundus-btn', href: 'fundus.html'}
    ];

    buttons.forEach(btn => {
        const element = document.getElementById(btn.id);
        if (element) {
            element.addEventListener('click', () => {
                window.location.href = btn.href;
            });
        }
    });
</script>

</body>
</html>
