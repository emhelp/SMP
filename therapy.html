<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Терапия</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .therapy-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .therapy-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .therapy-btn:hover {
    background: #3949ab;
  }

  .therapy-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .therapy-menu {
      max-width: 90%;
    }
    .therapy-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>

  <button class="therapy-btn" onclick="window.location.href='hyperglycemia.html'">Гипергликемия</button>
  <button class="therapy-btn" onclick="window.location.href='hypoglycemia.html'">Гипогликемия</button>
  <button class="therapy-btn" onclick="window.location.href='hypothyroidism.html'">Гипотиреоз</button>
