<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>РАНЫ в т.ч инфицированные</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .wound-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .wound-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .wound-btn:hover {
    background: #3949ab;
  }

  .wound-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .wound-menu {
      max-width: 90%;
    }
    .wound-btn {
      font-size: 0.9rem;
    }
  }

  .section-header {
    color: #0f1446;
    font-weight: 700;
    margin: 15px 0 5px 0;
    padding-left: 5px;
    border-left: 4px solid #0f1446;
    font-size: 0.9rem;
    letter-spacing: 0.5px;
  }

  .section-header:first-of-type {
    margin-top: 0;
  }
</style>
</head>
<body>

<div class="wound-menu">
  <div class="section-header">📌 ГОЛОВА</div>
  <button class="wound-btn" onclick="window.location.href='gunshot_wound_forehead.html'">Огнестрельная рана лба (выстрел с близкого расстояния)</button>
  <button class="wound-btn" onclick="window.location.href='scalped_wound_head.html'">Скальпированная рана головы</button>
  <button class="wound-btn" onclick="window.location.href='lacerated_wound_forehead.html'">Рваная рана лба</button>

  <button class="wound-btn" onclick="window.location.href='contused_wound_left_eyebrow.html'">Ушибленная рана левой брови</button>
  <button class="wound-btn" onclick="window.location.href='contused_wound_right_frontoparietal.html'">Ушибленная рана лобно-теменной области справа</button>

  <button class="wound-btn" onclick="window.location.href='contused_wound_lower_lip.html'">Ушибленная рана нижней губы</button>
  <button class="wound-btn" onclick="window.location.href='infected_wound_right_cheek.html'">Инфицированная рана правой щеки</button>

  <button class="wound-btn" onclick="window.location.href='cut_wound_with_flexor_tendon_injury_iii_finger_right.html'">Резаная рана с повреждением поверхностного и глубокого сухожилия сгибателя III пальца правой кисти</button>

  <button class="wound-btn" onclick="window.location.href='stab_wound_foot.html'">Колотая рана стопы</button>

</body>
</html>
