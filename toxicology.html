<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Токсикология</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .toxicology-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .toxicology-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .toxicology-btn:hover {
    background: #3949ab;
  }

  .toxicology-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .toxicology-menu {
      max-width: 90%;
    }
    .toxicology-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>Токсикология</h1>

<div class="toxicology-menu">
  <button class="toxicology-btn" onclick="window.location.href='kerosene_observation.html'">Выпил керосин (наблюдение)</button>
  <button class="toxicology-btn" onclick="window.location.href='alcohol_consumption.html'">Употребление алкоголя</button>
  <button class="toxicology-btn" onclick="window.location.href='drug_consumption.html'">Употребление наркотиков</button>
  <button class="toxicology-btn" onclick="window.location.href='amitriptyline_poisoning.html'">Отравление амитриптилином</button>
  <button class="toxicology-btn" onclick="window.location.href='amitriptyline_poisoning_coma.html'">Отравление амитриптилином. Кома</button>
  <button class="toxicology-btn" onclick="window.location.href='heroin_poisoning_coma.html'">Отравление героином. Кома (передоз)</button>
  <button class="toxicology-btn" onclick="window.location.href='kerosene_poisoning.html'">Отравление керосином</button>
  <button class="toxicology-btn" onclick="window.location.href='neuroleptic_poisoning.html'">Отравление нейролептиками</button>
  <button class="toxicology-btn" onclick="window.location.href='caustic_alkali_toxic_effect.html'">Токсическое действие едких щелочей</button>
</div>

</body>
</html>
