<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Приложения к алгоритмам</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #0f1446;
    font-size: 28px;
  }

  .subtitle {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
    color: #0f1446;
  }

  .subtitle a {
    color: #0f1446;
    text-decoration: underline;
    font-weight: bold;
  }

  .apps-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .apps-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 15px;
    border-radius: 12px;
    font-weight: bold;
    text-align: left;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .apps-btn:active {
    transform: scale(0.98);
  }

  /* Стиль для неактивных кнопок */
  .apps-btn.disabled {
    background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
    cursor: not-allowed;
    opacity: 0.65;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .apps-menu {
      max-width: 90%;
    }
    .apps-btn {
      font-size: 14px;
      padding: 12px 12px;
    }
    h1 {
      font-size: 22px;
    }
    .subtitle {
      font-size: 14px;
    }
  }

  /* Модальное окно для просмотра изображений */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .modal-content {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    background: none;
    border: none;
  }

  .close-modal:hover {
    color: #ccc;
  }
</style>
</head>
<body>

<div class="subtitle">Так же смотрите раздел <a href="calculators.html">"Калькуляторы"</a></div>

<!-- Модальное окно для изображений -->
<div id="imageModal" class="modal">
  <button class="close-modal" onclick="closeModal()">&times;</button>
  <img id="modalImage" class="modal-content">
</div>

<script>
  // Функция открытия изображения в модальном окне
  function openImage(imagePath) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    modal.style.display = 'flex';
    modalImg.src = imagePath;
  }

  // Функция закрытия модального окна
  function closeModal() {
    document.getElementById('imageModal').style.display = 'none';
  }

  // Закрытие по клику вне изображения
  document.getElementById('imageModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ SW зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка:', err));
  }
</script>

</body>
</html>
