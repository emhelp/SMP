<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Приложения к алгоритмам</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
    font-size: 28px;
  }

  .apps-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .apps-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 15px;
    border-radius: 12px;
    font-weight: bold;
    text-align: left;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .apps-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .apps-menu {
      max-width: 90%;
    }
    .apps-btn {
      font-size: 14px;
      padding: 12px 12px;
    }
    h1 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<h1>📋 Приложения к алгоритмам</h1>

<div class="apps-menu">
  <button class="apps-btn" onclick="window.location.href='slr_parameters.html'">1) Параметры проведения СЛР</button>
  <button class="apps-btn" onclick="window.location.href='tube_sizes.html'">2) Размеры эндотрахеальных, ларингеальных трубок и катетеров для аспирации</button>
  <button class="apps-btn" onclick="window.location.href='airway_children.html'">3) Тактика обеспечения проходимости дыхательных путей у детей</button>
  <button class="apps-btn" onclick="window.location.href='airway_adults.html'">4) Тактика обеспечения проходимости дыхательных путей у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='difficult_intubation.html'">5) Порядок действий при "трудной" интубации трахеи у пациента с сохраненной сердечной деятельностью</button>
  <button class="apps-btn" onclick="window.location.href='respiratory_support.html'">6) Параметры респираторной поддержки при сохраненном самостоятельном кровообращении</button>
  <button class="apps-btn" onclick="window.location.href='apgar_score.html'">7) Критерии оценки новорожденного по шкале Апгар</button>
  <button class="apps-btn" onclick="window.location.href='newborn_resuscitation.html'">8) Алгоритм первичной реанимации новорожденного (при рождении)</button>
  <button class="apps-btn" onclick="window.location.href='newborn_ventilation.html'">9) Начальные параметры ИВЛ у новорожденных</button>
  <button class="apps-btn" onclick="window.location.href='children_norms.html'">10) Физиологические возрастные нормы у детей (в покое)</button>
  <button class="apps-btn" onclick="window.location.href='gastric_lavage_children.html'">11) Промывание желудка у детей</button>
  <button class="apps-btn" onclick="window.location.href='burn_area_children.html'">12) Определение площади ожогов у детей (по Lund и Browder)</button>
  <button class="apps-btn" onclick="window.location.href='pain_scales.html'">13) Шкалы для оценки интенсивности боли</button>
  <button class="apps-btn" onclick="window.location.href='acute_respiratory_failure.html'">14) Острая дыхательная недостаточность</button>
  <button class="apps-btn" onclick="window.location.href='geneva_score.html'">15) Шкала оценки вероятности ТЭЛА (Revised Geneva Score)</button>
  <button class="apps-btn" onclick="window.location.href='shoks.html'">16) ШОКС</button>
  <button class="apps-btn" onclick="window.location.href='heart_failure_algorithm.html'">17) Алгоритм ведения декомпенсированной сердечной недостаточности на этапе оказания СМП</button>
  <button class="apps-btn" onclick="window.location.href='glasgow_scale.html'">18) Шкала комы ГЛАЗГО для взрослых и детей</button>
  <button class="apps-btn" onclick="window.location.href='lams_scale.html'">19) Шкала моторного дефицита LAMS</button>
  <button class="apps-btn" onclick="window.location.href='alcohol_withdrawal_scale.html'">20) Шкала оценки состояния отмены алкоголя</button>
  <button class="apps-btn" onclick="window.location.href='rass_scale.html'">21) Шкала RASS</button>
  <button class="apps-btn" onclick="window.location.href='suicide_risk_scale.html'">22) Шкала оценки риска суицида (ШОРС)</button>
  <button class="apps-btn" onclick="window.location.href='suicide_actions.html'">23) Тактика действий при суицидоопасных состояниях</button>
  <button class="apps-btn" onclick="window.location.href='antidotes.html'">24) Перечень антидотов</button>
  <button class="apps-btn" onclick="window.location.href='opioid_miosis.html'">25) Дифференциальная диагностика отравлений опиатами по признаку: "миоз" с угнетением сознания</button>
  <button class="apps-btn" onclick="window.location.href='opioid_mydriasis.html'">26) Дифференциальная диагностика отравлений опиатами по признаку: "мидриаз"</button>
  <button class="apps-btn" onclick="window.location.href='poisoning_no_pupil_change.html'">27) Дифференциальная диагностика отравлений - "Без четкого изменения диаметра зрачка"</button>
  <button class="apps-btn" onclick="window.location.href='dehydration_adults.html'">28) Дифференциальная диагностика дегидратации у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='dehydration_children.html'">29) Дифференциальная диагностика степеней токсикоза с эксикозом (дегидратации) у детей</button>
  <button class="apps-btn" onclick="window.location.href='news_score.html'">30) NEWS - Оценка тяжести состояния пациента при пневмонии</button>
  <button class="apps-btn" onclick="window.location.href='dopamine_adults.html'">31) Инфузия Допамина у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='dopamine_children.html'">32) Инфузия Допамина у детей</button>
  <button class="apps-btn" onclick="window.location.href='dobutamine_adults.html'">33) Инфузия Добутамина у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='dobutamine_children.html'">34) Инфузия Добутамина у детей</button>
  <button class="apps-btn" onclick="window.location.href='norepinephrine_adults.html'">35) Инфузия Норэпинефрина у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='norepinephrine_children.html'">36) Инфузия Норэпинефрина у детей</button>
  <button class="apps-btn" onclick="window.location.href='epinephrine_adults.html'">37) Инфузия Эпинефрина у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='epinephrine_children.html'">38) Инфузия Эпинефрина у детей</button>
  <button class="apps-btn" onclick="window.location.href='nitroglycerin_infusion.html'">39) Инфузия Нитроглицерина капельно</button>
  <button class="apps-btn" onclick="window.location.href='amiodarone_children.html'">40) Инфузия Амиодарона у детей</button>
  <button class="apps-btn" onclick="window.location.href='burn_shock_adults.html'">41) Инфузия растворов при ожоговом шоке у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='burn_shock_children.html'">42) Инфузия растворов при ожоговом шоке у детей</button>
  <button class="apps-btn" onclick="window.location.href='diazepam_children.html'">43) Внутривенное введение раствора Диазепама у детей</button>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ SW зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка:', err));
  }
</script>

</body>
</html>
