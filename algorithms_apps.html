<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Приложения к алгоритмам</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
    font-size: 28px;
  }

  .apps-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .apps-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 15px;
    border-radius: 12px;
    font-weight: bold;
    text-align: left;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .apps-btn:active {
    transform: scale(0.98);
  }

  /* Стиль для неактивных кнопок */
  .apps-btn.disabled {
    background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
    cursor: not-allowed;
    opacity: 0.65;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .apps-menu {
      max-width: 90%;
    }
    .apps-btn {
      font-size: 14px;
      padding: 12px 12px;
    }
    h1 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<h1>📋 Приложения к алгоритмам</h1>

<div class="apps-menu">
  <!-- Активные кнопки 1-11 -->
  <button class="apps-btn" onclick="window.location.href='slr_parameters.html'">1) Параметры проведения СЛР</button>
  <button class="apps-btn" onclick="window.location.href='tube_sizes.html'">2) Размеры эндотрахеальных, ларингеальных трубок и катетеров для аспирации</button>
  <button class="apps-btn" onclick="window.location.href='airway_children.html'">3) Тактика обеспечения проходимости дыхательных путей у детей</button>
  <button class="apps-btn" onclick="window.location.href='airway_adults.html'">4) Тактика обеспечения проходимости дыхательных путей у взрослых</button>
  <button class="apps-btn" onclick="window.location.href='difficult_intubation.html'">5) Порядок действий при "трудной" интубации трахеи у пациента с сохраненной сердечной деятельностью</button>
  <button class="apps-btn" onclick="window.location.href='respiratory_support.html'">6) Параметры респираторной поддержки при сохраненном самостоятельном кровообращении</button>
  <button class="apps-btn" onclick="window.location.href='apgar_score.html'">7) Критерии оценки новорожденного по шкале Апгар</button>
  <button class="apps-btn" onclick="window.location.href='newborn_resuscitation.html'">8) Алгоритм первичной реанимации новорожденного (при рождении)</button>
  <button class="apps-btn" onclick="window.location.href='newborn_ventilation.html'">9) Начальные параметры ИВЛ у новорожденных</button>
  <button class="apps-btn" onclick="window.location.href='children_norms.html'">10) Физиологические возрастные нормы у детей (в покое)</button>
  <button class="apps-btn" onclick="window.location.href='gastric_lavage_children.html'">11) Промывание желудка у детей</button>

  <!-- Неактивные кнопки 12-43 -->
  <button class="apps-btn disabled">12) Определение площади ожогов у детей (по Lund и Browder)</button>
  <button class="apps-btn disabled">13) Шкалы для оценки интенсивности боли</button>
  <button class="apps-btn disabled">14) Острая дыхательная недостаточность</button>
  <button class="apps-btn disabled">15) Шкала оценки вероятности ТЭЛА (Revised Geneva Score)</button>
  <button class="apps-btn disabled">16) ШОКС</button>
  <button class="apps-btn disabled">17) Алгоритм ведения декомпенсированной сердечной недостаточности на этапе оказания СМП</button>
  <button class="apps-btn disabled">18) Шкала комы ГЛАЗГО для взрослых и детей</button>
  <button class="apps-btn disabled">19) Шкала моторного дефицита LAMS</button>
  <button class="apps-btn disabled">20) Шкала оценки состояния отмены алкоголя</button>
  <button class="apps-btn disabled">21) Шкала RASS</button>
  <button class="apps-btn disabled">22) Шкала оценки риска суицида (ШОРС)</button>
  <button class="apps-btn disabled">23) Тактика действий при суицидоопасных состояниях</button>
  <button class="apps-btn disabled">24) Перечень антидотов</button>
  <button class="apps-btn disabled">25) Дифференциальная диагностика отравлений опиатами по признаку: "миоз" с угнетением сознания</button>
  <button class="apps-btn disabled">26) Дифференциальная диагностика отравлений опиатами по признаку: "мидриаз"</button>
  <button class="apps-btn disabled">27) Дифференциальная диагностика отравлений - "Без четкого изменения диаметра зрачка"</button>
  <button class="apps-btn disabled">28) Дифференциальная диагностика дегидратации у взрослых</button>
  <button class="apps-btn disabled">29) Дифференциальная диагностика степеней токсикоза с эксикозом (дегидратации) у детей</button>
  <button class="apps-btn disabled">30) NEWS - Оценка тяжести состояния пациента при пневмонии</button>
  <button class="apps-btn disabled">31) Инфузия Допамина у взрослых</button>
  <button class="apps-btn disabled">32) Инфузия Допамина у детей</button>
  <button class="apps-btn disabled">33) Инфузия Добутамина у взрослых</button>
  <button class="apps-btn disabled">34) Инфузия Добутамина у детей</button>
  <button class="apps-btn disabled">35) Инфузия Норэпинефрина у взрослых</button>
  <button class="apps-btn disabled">36) Инфузия Норэпинефрина у детей</button>
  <button class="apps-btn disabled">37) Инфузия Эпинефрина у взрослых</button>
  <button class="apps-btn disabled">38) Инфузия Эпинефрина у детей</button>
  <button class="apps-btn disabled">39) Инфузия Нитроглицерина капельно</button>
  <button class="apps-btn disabled">40) Инфузия Амиодарона у детей</button>
  <button class="apps-btn disabled">41) Инфузия растворов при ожоговом шоке у взрослых</button>
  <button class="apps-btn disabled">42) Инфузия растворов при ожоговом шоке у детей</button>
  <button class="apps-btn disabled">43) Внутривенное введение раствора Диазепама у детей</button>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ SW зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка:', err));
  }
</script>

</body>
</html>
