<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Приложения к алгоритмам</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1446">

<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 10px;
    color: #0f1446;
    font-size: 28px;
  }

  .subtitle {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
    color: #0f1446;
  }

  .calc-mini-btn {
    display: inline-block;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    color: white;
    text-decoration: none;
    font-weight: bold;
    padding: 6px 16px;
    border-radius: 20px;
    margin-left: 8px;
    font-size: 16px;
    transition: all 0.2s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .calc-mini-btn:active {
    transform: scale(0.96);
  }

  .apps-menu {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .apps-btn {
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #0f1446 0%, #1a1f5e 100%);
    padding: 16px 15px;
    border-radius: 12px;
    font-weight: bold;
    text-align: left;
    width: 100%;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .apps-btn:active {
    transform: scale(0.98);
  }

  /* Стиль для неактивных кнопок */
  .apps-btn.disabled {
    background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
    cursor: not-allowed;
    opacity: 0.65;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .apps-menu {
      max-width: 90%;
    }
    .apps-btn {
      font-size: 14px;
      padding: 12px 12px;
    }
    h1 {
      font-size: 22px;
    }
    .subtitle {
      font-size: 14px;
    }
    .calc-mini-btn {
      font-size: 14px;
      padding: 4px 14px;
    }
  }

  /* Модальное окно для просмотра изображений */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .modal-content {
    max-width: 90%;
    max-height: 70%;
    object-fit: contain;
  }

  .close-modal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: #fff;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    background: none;
    border: none;
    z-index: 1001;
  }

  .close-modal:hover {
    color: #ccc;
  }

  /* Контейнер для кнопок навигации под изображением */
  .nav-container {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    align-items: center;
    justify-content: center;
    background-color: rgba(0,0,0,0.5);
    padding: 6px 20px;
    border-radius: 40px;
    z-index: 1001;
  }

  .nav-btn {
    background-color: transparent;
    color: white;
    font-size: 28px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    padding: 0 12px;
    transition: all 0.2s;
  }

  .nav-btn:hover {
    color: #ccc;
    transform: scale(1.1);
  }

  .nav-btn:active {
    transform: scale(0.95);
  }

  .counter {
    color: white;
    background-color: rgba(0,0,0,0.6);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>

<h1>📋 Приложения к алгоритмам</h1>
<div class="subtitle">Также смотрите раздел <a href="calculators.html" class="calc-mini-btn">Калькуляторы</a></div>

<div class="apps-menu">
  <!-- Активные кнопки 1-12 -->
  <button class="apps-btn" onclick="openImage('Параметры проведения СЛР.jpg')">1) Параметры проведения СЛР</button>
  <button class="apps-btn" onclick="openImage('Размеры эндотрахеальных трубок и катетеров.png')">2) Размеры эндотрахеальных, ларингеальных трубок и катетеров для аспирации</button>
  <button class="apps-btn" onclick="openImage('Тактика обеспечения проходимости дыхательных путей у детей.png')">3) Тактика обеспечения проходимости дыхательных путей у детей</button>
  <button class="apps-btn" onclick="openImage('Тактика обеспечения проходимости дыхательных путей у взрослых.png')">4) Тактика обеспечения проходимости дыхательных путей у взрослых</button>
  <button class="apps-btn" onclick="openImage('Порядок действия при «трудной» интубации трахеи.png')">5) Порядок действий при "трудной" интубации трахеи у пациента с сохраненной сердечной деятельностью</button>
  <button class="apps-btn" onclick="openImage('Параметры респираторной поддержки при сохраненном самостоятельном кровообращении.jpg')">6) Параметры респираторной поддержки при сохраненном самостоятельном кровообращении</button>
  <button class="apps-btn" onclick="openImage('Критерии оценки новорождённого по Апгар.jpg')">7) Критерии оценки новорожденного по шкале Апгар</button>
  <button class="apps-btn" onclick="openImage('Алгоритм первичной реанимации новорождённого при рождении.png')">8) Алгоритм первичной реанимации новорожденного (при рождении)</button>
  <button class="apps-btn" onclick="openImage('Начальные параметры ИВЛ у новорожденных.jpg')">9) Начальные параметры ИВЛ у новорожденных</button>
  <button class="apps-btn" onclick="openImage('Физиологические возрастные нормы у детей.jpg')">10) Физиологические возрастные нормы у детей (в покое)</button>
  <button class="apps-btn" onclick="openImage('Промывание желудка у детей.png')">11) Промывание желудка у детей</button>
  <button class="apps-btn" onclick="openImage('Определение площади ожогов у детей.png')">12) Определение площади ожогов у детей (по Lund и Browder)</button>

  <!-- Активная кнопка 13 с каруселью -->
  <button class="apps-btn" onclick="openImageGallery(['Шкалы оценки боли взрослая.png', 'Шкалы оценки боли детская.png'])">13) Шкалы для оценки интенсивности боли</button>

  <!-- Активные кнопки 14, 15, 16 -->
  <button class="apps-btn" onclick="openImage('Острая дыхательная недостаточность.png')">14) Острая дыхательная недостаточность</button>
  <button class="apps-btn" onclick="openImage('Шкала оценки ТЭЛА.png')">15) Шкала оценки вероятности ТЭЛА (Revised Geneva Score)</button>
  <button class="apps-btn" onclick="openImage('Шкала ШОКС.png')">16) ШОКС</button>
  
  <!-- Активированная кнопка 17 -->
  <button class="apps-btn" onclick="openImage('Алгоритм ведения декомпенсированной СН.jpg')">17) Алгоритм ведения декомпенсированной сердечной недостаточности на этапе оказания СМП</button>
  
  <button class="apps-btn" onclick="openImage('Шкала комы.png')">18) Шкала комы ГЛАЗГО для взрослых и детей</button>

  <!-- Активные кнопки 19, 20, 21 -->
  <button class="apps-btn" onclick="openImage('Шкала LAMS.jpg')">19) Шкала моторного дефицита LAMS</button>
  <button class="apps-btn" onclick="openImage('Шкала оценки отмены алкоголя.jpg')">20) Шкала оценки состояния отмены алкоголя</button>
  <button class="apps-btn" onclick="openImage('Шкала RASS.jpg')">21) Шкала RASS</button>

  <!-- Активированные кнопки 22 и 23 -->
  <button class="apps-btn" onclick="openImage('Шкала оценки риска суицида.jpg')">22) Шкала оценки риска суицида (ШОРС)</button>
  <button class="apps-btn" onclick="openImage('Тактика при суицидоопасных состояниях.jpg')">23) Тактика действий при суицидоопасных состояниях</button>

  <!-- НЕАКТИВНЫЕ кнопки 24-30 -->
  <button class="apps-btn disabled">24) Перечень антидотов</button>
  <button class="apps-btn disabled">25) Дифференциальная диагностика отравлений опиатами по признаку: "миоз" с угнетением сознания</button>
  <button class="apps-btn disabled">26) Дифференциальная диагностика отравлений опиатами по признаку: "мидриаз"</button>
  <button class="apps-btn disabled">27) Дифференциальная диагностика отравлений - "Без четкого изменения диаметра зрачка"</button>
  <button class="apps-btn disabled">28) Дифференциальная диагностика дегидратации у взрослых</button>

  <!-- Активированные кнопки 31-36 - инфузии -->

  <button class="apps-btn" onclick="location.href='dobutamine-adult.html'">33) Инфузия Добутамина у взрослых</button>
  <button class="apps-btn" onclick="location.href='dobutamine-child.html'">34) Инфузия Добутамина у детей</button>
  <button class="apps-btn" onclick="location.href='norepinephrine-adult.html'">35) Инфузия Норэпинефрина у взрослых</button>
  <button class="apps-btn" onclick="location.href='norepinephrine-child.html'">36) Инфузия Норэпинефрина у детей</button>

  <!-- Активированные кнопки 37-40 -->
  <button class="apps-btn" onclick="location.href='epinephrine-adult.html'">37) Инфузия Эпинефрина у взрослых</button>
  <button class="apps-btn" onclick="location.href='epinephrine-child.html'">38) Инфузия Эпинефрина у детей</button>
  <button class="apps-btn" onclick="location.href='nitroglycerin-infusion.html'">39) Инфузия Нитроглицерина капельно</button>
  <button class="apps-btn" onclick="location.href='amiodarone-child.html'">40) Инфузия Амиодарона у детей</button>

  <!-- Неактивные кнопки 41-43 -->
  <button class="apps-btn disabled">41) Инфузия растворов при ожоговом шоке у взрослых</button>
  <button class="apps-btn disabled">42) Инфузия растворов при ожоговом шоке у детей</button>
  <button class="apps-btn disabled">43) Внутривенное введение раствора Диазепама у детей</button>
</div>

<!-- Модальное окно для изображений -->
<div id="imageModal" class="modal">
  <button class="close-modal" onclick="closeModal()">&times;</button>
  <img id="modalImage" class="modal-content">
  <div id="navContainer" class="nav-container" style="display: none;">
    <button class="nav-btn" id="prevBtn">❮</button>
    <span id="imageCounter" class="counter">1 / 2</span>
    <button class="nav-btn" id="nextBtn">❯</button>
  </div>
</div>

<script>
  // Переменные для карусели
  let currentGallery = [];
  let currentIndex = 0;
  let isGalleryMode = false;

  // Функция открытия одного изображения
  function openImage(imagePath) {
    isGalleryMode = false;
    currentGallery = [];
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const navContainer = document.getElementById('navContainer');
    
    navContainer.style.display = 'none';
    
    modal.style.display = 'flex';
    modalImg.src = imagePath;
  }

  // Функция открытия галереи изображений
  function openImageGallery(images) {
    isGalleryMode = true;
    currentGallery = images;
    currentIndex = 0;
    
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const navContainer = document.getElementById('navContainer');
    const counter = document.getElementById('imageCounter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    navContainer.style.display = 'flex';
    modal.style.display = 'flex';
    
    // Обновляем изображение и счетчик
    modalImg.src = currentGallery[currentIndex];
    counter.textContent = `${currentIndex + 1} / ${currentGallery.length}`;
    
    // Обновляем состояние кнопок
    updateNavButtons();
  }

  // Обновление состояния кнопок навигации
  function updateNavButtons() {
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    prevBtn.style.opacity = currentIndex === 0 ? '0.4' : '1';
    nextBtn.style.opacity = currentIndex === currentGallery.length - 1 ? '0.4' : '1';
  }

  // Обновление текущего изображения в галерее
  function updateGalleryImage() {
    const modalImg = document.getElementById('modalImage');
    const counter = document.getElementById('imageCounter');
    modalImg.src = currentGallery[currentIndex];
    counter.textContent = `${currentIndex + 1} / ${currentGallery.length}`;
    updateNavButtons();
  }

  // Следующее изображение
  function nextImage() {
    if (!isGalleryMode) return;
    if (currentIndex < currentGallery.length - 1) {
      currentIndex++;
      updateGalleryImage();
    }
  }

  // Предыдущее изображение
  function prevImage() {
    if (!isGalleryMode) return;
    if (currentIndex > 0) {
      currentIndex--;
      updateGalleryImage();
    }
  }

  // Функция закрытия модального окна
  function closeModal() {
    document.getElementById('imageModal').style.display = 'none';
    isGalleryMode = false;
    currentGallery = [];
  }

  // Обработчики для кнопок навигации
  document.getElementById('prevBtn').addEventListener('click', prevImage);
  document.getElementById('nextBtn').addEventListener('click', nextImage);

  // Закрытие по клику на фон (но не на кнопки)
  document.getElementById('imageModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeModal();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/SMP/sw.js')
      .then(reg => console.log('✅ SW зарегистрирован:', reg))
      .catch(err => console.error('❌ Ошибка:', err));
  }
</script>

</body>
</html>
