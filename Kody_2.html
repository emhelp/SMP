    // Удаление дубликатов по internalCode + mkb
    const uniqueData = [];
    const keySet = new Set();
    for (const item of neoplasmsData) {
        const key = `${item.internalCode}|${item.mkb}`;
        if (!keySet.has(key)) {
            keySet.add(key);
            uniqueData.push(item);
        }
    }

    // Сортировка по алфавиту
    uniqueData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function renderCards(filterText = '') {
        const grid = document.getElementById('neoplasmsGrid');
        if (!grid) return;
        
        const lowerFilter = filterText.toLowerCase().trim();
        let filtered = uniqueData;
        
        if (lowerFilter !== '') {
            filtered = uniqueData.filter(item => {
                return item.name.toLowerCase().includes(lowerFilter) ||
                       item.mkb.toLowerCase().includes(lowerFilter) ||
                       item.internalCode.includes(lowerFilter) ||
                       (item.desc && item.desc.toLowerCase().includes(lowerFilter));
            });
        }
        
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results">🚫 Ничего не найдено. Попробуйте другой поисковый запрос.</div>`;
            return;
        }
        
        grid.innerHTML = '';
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'disease-name';
            nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);
            
            const codeBlockDiv = document.createElement('div');
            codeBlockDiv.className = 'code-block';
            
            const codesRow = document.createElement('div');
            codesRow.className = 'codes-row';
            
            const mkbSpan = document.createElement('div');
            mkbSpan.className = 'mkb-line';
            mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codesRow.appendChild(mkbSpan);
            
            const innerSpan = document.createElement('div');
            innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codesRow.appendChild(innerSpan);
            
            codeBlockDiv.appendChild(codesRow);
            
            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div');
                descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }
            
            card.appendChild(titleDiv);
            card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            renderCards(e.target.value);
        });
    }
    
    renderCards();
</script>
</body>
</html>
