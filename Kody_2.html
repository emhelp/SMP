            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .grid {

            font-weight: 800;
            color: #0c4e6b;
            line-height: 1.3;
            letter-spacing: -0.2px;
        }

        .code-block {
            padding: 14px 18px 16px 18px;
            background: #ffffff;
            flex: 1;
        }

        .mkb-line {

            font-size: 0.9rem;

            background: #eef2f8;
            padding: 5px 12px;
            border-radius: 32px;
            margin-bottom: 10px;
            border: 1px solid #d0dee9;
            display: inline-block;
            letter-spacing: 0.2px;
        }

        .inner-code-block {
            margin-top: 8px;
            margin-bottom: 12px;
            background: #f9f3e0;
            padding: 5px 12px;
            border-radius: 28px;
            display: inline-block;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-weight: 500;
            font-size: 0.85rem;
            color: #a55217;
            border: 1px solid #ffe0a3;
        }

        .inner-code-block strong {
            font-weight: 700;
            color: #8b3c0c;
        }

        .description {
            margin-top: 10px;
            font-size: 0.88rem;
            line-height: 1.4;
            color: #2c4e62;
            background: #fefef7;
            padding: 8px 12px;
            border-radius: 18px;
            border-left: 3px solid #7fc1db;
        }

        .description em {
            font-style: italic;
            background: #fff2dd;
            padding: 0 2px;
            border-radius: 6px;
        }

        @media (max-width: 760px) {
            body {
                padding: 14px 12px;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .disease-name {
                font-size: 1.1rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

    // Сортировка по алфавиту
    neoplasmsData.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    function renderCards() {
        const grid = document.getElementById('neoplasmsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        neoplasmsData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            const titleDiv = document.createElement('div');
            titleDiv.className = 'disease-title';
            const nameSpan = document.createElement('div');
            nameSpan.className = 'disease-name';
            nameSpan.textContent = item.name;
            titleDiv.appendChild(nameSpan);
            
            const codeBlockDiv = document.createElement('div');
            codeBlockDiv.className = 'code-block';
            
            const mkbSpan = document.createElement('div');
            mkbSpan.className = 'mkb-line';
            mkbSpan.textContent = `МКБ-10: ${item.mkb}`;
            codeBlockDiv.appendChild(mkbSpan);
            
            const innerSpan = document.createElement('div');
            innerSpan.className = 'inner-code-block';
            innerSpan.innerHTML = `<strong>Код ССиНМП:</strong> ${item.internalCode}`;
            codeBlockDiv.appendChild(innerSpan);
            
            if (item.desc && item.desc.trim() !== "") {
                const descDiv = document.createElement('div');
                descDiv.className = 'description';
                descDiv.innerHTML = `<em>${escapeHtml(item.desc)}</em>`;
                codeBlockDiv.appendChild(descDiv);
            }
            
            card.appendChild(titleDiv);
            card.appendChild(codeBlockDiv);
            grid.appendChild(card);
        });
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    renderCards();
