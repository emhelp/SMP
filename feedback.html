<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Обратная связь | EMHelp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #e9ecef;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 40px 20px;
            color: #212529;
            line-height: 1.45;
        }

        .card {
            max-width: 1100px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            border: 1px solid #dee2e6;
        }

        .mkb-row {
            background: linear-gradient(135deg, #0b3b5f 0%, #1a4d6f 100%);
            color: white;
            padding: 20px 32px;
            font-weight: 600;
            font-size: 1.1rem;
            border-bottom: 4px solid #ffc107;
        }

        .mkb-row span {
            font-weight: 700;
            color: #ffc107;
        }

        .content {
            padding: 24px 32px 40px 32px;
        }

        .section {
            margin-bottom: 32px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a4d6f;
            border-left: 6px solid #ffc107;
            padding-left: 16px;
            margin-bottom: 18px;
            margin-top: 8px;
            background: #f4f9ff;
            border-radius: 0 12px 12px 0;
            line-height: 1.3;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            color: #1e4663;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d0d0d0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s ease;
            background-color: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ffc107;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .required {
            color: #dc2626;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1a4d6f 0%, #0b3b5f 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(26, 77, 111, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 77, 111, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #1a4d6f;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            text-decoration: underline;
            color: #ffc107;
        }

        .message {
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        @media (max-width: 700px) {
            body {
                padding: 20px 16px;
            }
            .content {
                padding: 20px;
            }
            .section-title {
                font-size: 1.2rem;
            }
            .mkb-row {
                padding: 16px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="mkb-row">
        📝 <span>Ваши отзывы и предложения</span>
    </div>

    <div class="content">
        <div class="section">
            <div class="section-title">✉️ Напишите нам</div>
            
            <div id="formMessage" class="message"></div>
            
            <form id="feedbackForm">
                <div class="form-group">
                    <label>Ваше имя <span class="required">*</span></label>
                    <input type="text" id="name" required placeholder="Введите ваше имя">
                </div>
                
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="example@mail.ru">
                </div>
                
                <div class="form-group">
                    <label>Сообщение <span class="required">*</span></label>
                    <textarea id="message" required placeholder="Оставьте предложение..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">📩 Отправить сообщение</button>
            </form>
            
            <a href="index.html" class="back-btn">← Вернуться на главную</a>
        </div>
    </div>
</div>

<script>
    // Google Apps Script URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwgbG0sndi-MSGHluiboiVbSW-qJDzN8gNOuQxSupsc51hbOGwD0SOafGlhW_0ve0CZ/exec?v=2';
    
    document.getElementById('feedbackForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;
        const messageDiv = document.getElementById('formMessage');
        
        const feedbackData = {
            name: name,
            contact: email,
            subject: "Предложение",
            message: message,
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent
        };
        
        let pendingMessages = JSON.parse(localStorage.getItem('pendingFeedback') || '[]');
        
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(feedbackData)
            });
            
            messageDiv.className = 'message success';
            messageDiv.textContent = '✅ Спасибо! Ваше сообщение отправлено.';
            document.getElementById('feedbackForm').reset();
            localStorage.removeItem('pendingFeedback');
            
        } catch (error) {
            pendingMessages.push(feedbackData);
            localStorage.setItem('pendingFeedback', JSON.stringify(pendingMessages));
            
            messageDiv.className = 'message success';
            messageDiv.textContent = '📱 Сообщение сохранено локально и будет отправлено при подключении к интернету.';
            document.getElementById('feedbackForm').reset();
        }
        
        setTimeout(() => {
            messageDiv.className = 'message';
            messageDiv.textContent = '';
        }, 5000);
    });
    
    async function sendPendingMessages() {
        const pendingMessages = JSON.parse(localStorage.getItem('pendingFeedback') || '[]');
        if (pendingMessages.length === 0) return;
        
        for (const msg of pendingMessages) {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(msg)
                });
            } catch (e) {
                console.log('Ошибка отправки сохраненного сообщения');
                return;
            }
        }
        localStorage.removeItem('pendingFeedback');
    }
    
    window.addEventListener('online', sendPendingMessages);
    
    if (navigator.onLine) {
        sendPendingMessages();
    }
</script>

</body>
</html>
