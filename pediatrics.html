<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Педиатрия</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .pediatrics-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .pediatrics-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .pediatrics-btn:hover {
    background: #3949ab;
  }

  .pediatrics-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .pediatrics-menu {
      max-width: 90%;
    }
    .pediatrics-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>Педиатрия</h1>

<div class="pediatrics-menu">
  <button class="pediatrics-btn" onclick="window.location.href='homeless_child.html'">Беспризорный</button>
  <button class="pediatrics-btn" onclick="window.location.href='hemorrhagic_vasculitis.html'">Геморрагический васкулит</button>
  <button class="pediatrics-btn" onclick="window.location.href='intussusception.html'">Инвагинация</button>
  <button class="pediatrics-btn" onclick="window.location.href='intestinal_colic.html'">Кишечная колика</button>
  <button class="pediatrics-btn" onclick="window.location.href='laryngitis.html'">Ларингит</button>
  <button class="pediatrics-btn" onclick="window.location.href='premature_baby.html'">Недоношенный (роды дома)</button>
  <button class="pediatrics-btn" onclick="window.location.href='neonatal_jaundice.html'">Неонатальная желтуха</button>
  <button class="pediatrics-btn" onclick="window.location.href='omphalitis.html'">Омфалит</button>
  <button class="pediatrics-btn" onclick="window.location.href='pylorospasm.html'">Пилороспазм</button>
  <button class="pediatrics-btn" onclick="window.location.href='poliomyelitis2.html'">Полиомиелит</button>
  <button class="pediatrics-btn" onclick="window.location.href='vaccination_reaction.html'">Реакция на иммунизацию</button>
  <button class="pediatrics-btn" onclick="window.location.href='teething_syndrome.html'">Синдром прорезывания зубов</button>
  <button class="pediatrics-btn" onclick="window.location.href='focal_scleroderma.html'">Склеродермия очаговая</button>
  <button class="pediatrics-btn" onclick="window.location.href='newborn_regurgitation.html'">Срыгивание новорождённого</button>
  <button class="pediatrics-btn" onclick="window.location.href='thrombocytopenic_purpura.html'">Тромбоцитопеническая пурпура</button>
</div>

</body>
</html>
