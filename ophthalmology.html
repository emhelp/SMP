<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Офтальмология</title>
<style>
  body {
    font-family: 'Segoe UI', 'Roboto', sans-serif;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f1446;
  }

  .ophthalmology-menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 500px;
    box-sizing: border-box;
  }

  .ophthalmology-btn {
    text-decoration: none;
    color: white;
    background: #0f1446;
    padding: 12px 15px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    box-sizing: border-box;
  }

  .ophthalmology-btn:hover {
    background: #3949ab;
  }

  .ophthalmology-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 600px) {
    .ophthalmology-menu {
      max-width: 90%;
    }
    .ophthalmology-btn {
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>

<h1>Офтальмологические состояния</h1>

<div class="ophthalmology-menu">
  <button class="ophthalmology-btn" onclick="window.location.href='blepharospassma.html'">Блефароспазм</button>
  <button class="ophthalmology-btn" onclick="window.location.href='glaucoma.html'">Глаукома</button>
  <button class="ophthalmology-btn" onclick="window.location.href='eye_foreign_body.html'">Инородное тело глаза</button>
  <button class="ophthalmology-btn" onclick="window.location.href='iridocyclitis.html'">Иридоциклит</button>
  <button class="ophthalmology-btn" onclick="window.location.href='cataract.html'">Катаракта</button>
  <button class="ophthalmology-btn" onclick="window.location.href='conjunctivitisiss.html'">Конъюнктивит</button>
  <button class="ophthalmology-btn" onclick="window.location.href='retinal_vessel_occlusion.html'">Окклюзия сосудов сетчатки</button>
  <button class="ophthalmology-btn" onclick="window.location.href='retinal_detachment.html'">Отслойка сетчатки</button>
  <button class="ophthalmology-btn" onclick="window.location.href='eyeball_contusion.html'">Ушиб глазного яблока</button>
  <button class="ophthalmology-btn" onclick="window.location.href='chemical_eye_burn_glue.html'">Химический ожог глаз (клей)</button>
  <button class="ophthalmology-btn" onclick="window.location.href='chemical_eye_burn_spray.html'">Химический ожог глаз (баллончик)</button>
  <button class="ophthalmology-btn" onclick="window.location.href='electroophthalmia.html'">Электроофтальмия</button>
</div>

</body>
</html>
