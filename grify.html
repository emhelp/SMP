<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Грифам МСК - Скорая помощь</title>
  <link rel="icon" href="1712743647196.png" type="image/png">
  <link rel="stylesheet" href="style.css">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f1446">
</head>
<body>

  <div class="header">
    <img src="1712743647196.png" alt="Логотип" class="logo">
    <h1>Скорая помощь</h1>
    <p>Проект EMHelp Group '2026</p>
  </div>

  <nav class="menu">
    <a href="consilium.html" class="menu-btn grify-item">КОНСИЛИУМЫ МСК</a>
    <a href="prikaz.html" class="menu-btn grify-item gradient">ПРИКАЗЫ МСК</a>
    <a href="stations.html" class="menu-btn grify-item burgundy">ПОДСТАНЦИИ МСК</a>
  </nav>

  <style>
    /* Кнопка "КОНСИЛИУМЫ МСК" — темно-синяя */
    .grify-item {
      background-color: #0f1446 !important;
      background-image: none !important;
    }
    
    /* Кнопка "ПРИКАЗЫ МСК" — градиент */
    .grify-item.gradient {
      background: linear-gradient(135deg, #0f1446 0%, #800000 100%) !important;
    }
    
    /* Кнопка "ПОДСТАНЦИИ МСК" — темно-красная */
    .grify-item.burgundy {
      background-color: #800000 !important;
      background-image: none !important;
    }
  </style>

  <!-- РЕГИСТРАЦИЯ СЕРВИС-ВОРКЕРА -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/SMP/sw.js')
        .then(reg => console.log('✅ Сервис-воркер зарегистрирован:', reg))
        .catch(err => console.error('❌ Ошибка:', err));
    }
  </script>

</body>
</html>
